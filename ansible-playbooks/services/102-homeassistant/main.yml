---
# ==============================================================================
# Playbook: Services – Home Assistant OS (VM)
# ==============================================================================
# Staged build – Stage 1: Bare Minimum
#
# Provisions a Proxmox KVM VM running HAOS, completes onboarding,
# and configures a static IP.  Nothing else.
#
# Stages (planned):
#   1. VM + Onboarding + Static IP          ← this file
#   2. Core config, default user, reverse proxy
#   3. Add-ons (Z2M, Matter) + MQTT integration
#   4. Backup & Restore
#
# Modules used (community.proxmox):
#   - proxmox_kvm   – VM creation, start/stop, USB passthrough
#   - proxmox_disk  – disk import (import_from), resize
#
# Inventory requirements (group 'homeassistant'):
#   - service_id, service_name, ansible_host, service_backend_port
# ==============================================================================

# ============================================================
# PLAY 1 – Provision the HAOS VM on the Proxmox host
# ============================================================
- name: Provision Home Assistant OS VM
  hosts: localhost
  become: yes
  gather_facts: yes
  tags: [provision]
  collections:
    - community.proxmox
  vars_files:
    - "../../inventory/group_vars/all.yml"
  vars:
    ha_port: "{{ hostvars[groups['homeassistant'][0]]['service_backend_port'] | default('8123') }}"
    # Numeric GiB value for proxmox_disk resize (strip 'G' suffix from ha_vm_disk_size)
    ha_vm_disk_size_gib: "{{ ha_vm_disk_size | regex_replace('[^0-9]', '') }}"

  module_defaults:
    group/community.proxmox.proxmox:
      api_host: "{{ proxmox_api_host }}"
      api_user: "{{ proxmox_api_user }}"
      api_token_id: "{{ proxmox_api_token_id }}"
      api_token_secret: "{{ proxmox_api_token_secret }}"

  tasks:
    - name: Ensure required packages are installed
      ansible.builtin.apt:
        name:
          - python3-proxmoxer
          - python3-requests
          - python3-websocket
          - wget
          - xz-utils
          - jq
          - curl
        state: present
        update_cache: yes

    - name: Ensure community.proxmox collection is installed
      ansible.builtin.command:
        cmd: ansible-galaxy collection install community.proxmox --upgrade
      register: collection_install
      changed_when: "'was installed' in collection_install.stdout or 'was upgraded' in collection_install.stdout"

    - name: Provision HAOS VM
      include_tasks: tasks/provision_vm.yml

    - name: Configure USB passthrough
      include_tasks: tasks/usb_passthrough.yml

    - name: Detect VM IP and wait for HA API
      include_tasks: tasks/detect_and_wait.yml


# ============================================================
# PLAY 2 – Onboard & assign static IP
# ============================================================
- name: Configure Home Assistant (Stage 1)
  hosts: localhost
  become: yes
  gather_facts: no
  tags: [configure]
  vars_files:
    - "../../inventory/group_vars/all.yml"
  vars:
    ha_port: "{{ hostvars[groups['homeassistant'][0]]['service_backend_port'] | default('8123') }}"

  tasks:
    - name: Complete onboarding and authenticate
      include_tasks: tasks/onboarding.yml

    - name: Configure static IP address
      include_tasks: tasks/configure_network.yml

    # --- Stage 1 health check: verify HA reachable on static IP ---
    - name: Verify HA API on static IP
      ansible.builtin.uri:
        url: "http://{{ hostvars[item]['ansible_host'] }}:{{ ha_port }}/api/config"
        method: GET
        headers:
          Authorization: "Bearer {{ ha_tokens[item] }}"
        status_code: [200]
        timeout: 30
      register: stage1_health
      retries: 30
      delay: 10
      until:
        - stage1_health.status is defined
        - stage1_health.status == 200
      loop: "{{ groups['homeassistant'] }}"
      when: item in ha_tokens

    - name: Show Stage 1 result
      ansible.builtin.debug:
        msg: >-
          Stage 1 complete – HA {{ item.json.version }}
          running on {{ hostvars[item.item]['ansible_host'] }}
          (state: {{ item.json.state }})
      loop: "{{ stage1_health.results }}"
      loop_control:
        label: "{{ item.item }}"
      when:
        - item.skipped is not defined or not item.skipped
        - item.status is defined and item.status == 200
