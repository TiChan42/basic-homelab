---
# ==============================================================================
# Playbook: Services – Home Assistant OS (VM)
# ==============================================================================
# Staged build – provisions a Proxmox KVM VM running HAOS and configures
# it step-by-step through 4 stages.
#
# Stage Layout (folders):
#   1. Provisioning + Restore          (tasks/stage1/)
#      VM lifecycle, onboarding, static IP, optional NAS restore.
#      Skipped when VM is healthy + API reachable.
#
#   2. Backup Strategy                 (tasks/stage2/)
#      Native backup config + NAS copy via Proxmox host.  Idempotent.
#
#   3. HA Configuration                (tasks/stage3/)
#      Core config, users, addons, MQTT, reverse proxy.
#      Post-restore Zigbee device refresh (clears stale frame counters).
#      Idempotent – skips anything already configured (incl. from restore).
#
#   4. Backup Creation                 (tasks/stage4/)
#      Triggers native HA backup to local + NAS.
#
# Modules used:
#   - community.proxmox.proxmox_kvm   – VM creation, start/stop
#   - community.proxmox.proxmox_disk  – disk resize
#   - ansible.builtin.uri             – HA REST API
#   - ha_supervisor_api.py            – HA Supervisor WebSocket API
#
# Inventory requirements (group 'homeassistant'):
#   - service_id, service_name, ansible_host, service_backend_port
# ==============================================================================


# ╔════════════════════════════════════════════════════════════╗
# ║  STAGE 1 – Provisioning + Restore                        ║
# ╚════════════════════════════════════════════════════════════╝

- name: "Homeassistant (Stage 1) - Provision HAOS VM"
  hosts: localhost
  become: yes
  gather_facts: yes
  tags: [stage1, provision]
  collections:
    - community.proxmox
  vars_files:
    - "../../inventory/group_vars/all.yml"
  vars:
    ha_port: "{{ hostvars[groups['homeassistant'][0]]['service_backend_port'] | default('8123') }}"
    ha_vm_disk_size_gib: "{{ ha_vm_disk_size | regex_replace('[^0-9]', '') }}"

  module_defaults:
    group/community.proxmox.proxmox:
      api_host: "{{ proxmox_api_host }}"
      api_user: "{{ proxmox_api_user }}"
      api_token_id: "{{ proxmox_api_token_id }}"
      api_token_secret: "{{ proxmox_api_token_secret }}"

  tasks:
    - name: "Homeassistant (Stage 1) - Install required packages"
      ansible.builtin.apt:
        name:
          - python3-proxmoxer
          - python3-requests
          - python3-websocket
          - wget
          - xz-utils
          - jq
          - curl
        state: present
        update_cache: yes

    - name: "Homeassistant (Stage 1) - Install Proxmox collection"
      ansible.builtin.command:
        cmd: ansible-galaxy collection install community.proxmox --upgrade
      register: collection_install
      changed_when: "'was installed' in collection_install.stdout or 'was upgraded' in collection_install.stdout"

    # --- Pre-flight: skip provisioning if VM is already healthy ---
    - name: "Homeassistant (Stage 1) - Check if VM already exists"
      ansible.builtin.command: "qm status {{ hostvars[item]['service_id'] }}"
      register: vm_preflight
      changed_when: false
      failed_when: false
      loop: "{{ groups['homeassistant'] }}"

    - name: "Homeassistant (Stage 1) - Check if HA API is reachable"
      ansible.builtin.uri:
        url: "http://{{ hostvars[item]['ansible_host'] }}:{{ ha_port }}/api/"
        method: GET
        status_code: [200, 401]
        timeout: 5
      register: ha_preflight
      failed_when: false
      loop: "{{ groups['homeassistant'] }}"

    - name: "Homeassistant (Stage 1) - Determine if provisioning is needed"
      ansible.builtin.set_fact:
        ha_provisioning_needed: >-
          {{ not (
            'running' in (vm_preflight.results | first).stdout | default('')
            and (ha_preflight.results | first).status | default(0) in [200, 401]
          ) }}

    - name: "Homeassistant (Stage 1) - Skip provisioning (VM healthy)"
      ansible.builtin.debug:
        msg: "VM running and HA API reachable – skipping provisioning."
      when: not (ha_provisioning_needed | bool)

    - name: "Homeassistant (Stage 1) - Provision HAOS VM"
      include_tasks: tasks/stage1/provision_vm.yml
      when: ha_provisioning_needed | bool

    - name: "Homeassistant (Stage 1) - Configure USB passthrough"
      include_tasks: tasks/stage1/usb_passthrough.yml
      when: ha_provisioning_needed | bool

    - name: "Homeassistant (Stage 1) - Detect VM IP and wait for API"
      include_tasks: tasks/stage1/detect_and_wait.yml
      when: ha_provisioning_needed | bool

    - name: "Homeassistant (Stage 1) - Set known IPs (existing system)"
      ansible.builtin.set_fact:
        ha_initial_ips: "{{ ha_initial_ips | default({}) | combine({item: hostvars[item]['ansible_host']}) }}"
      loop: "{{ groups['homeassistant'] }}"
      when: not (ha_provisioning_needed | bool)


- name: "Homeassistant (Stage 1) - Onboard & Configure Network"
  hosts: localhost
  become: yes
  gather_facts: no
  tags: [stage1, configure]
  vars_files:
    - "../../inventory/group_vars/all.yml"
  vars:
    ha_port: "{{ hostvars[groups['homeassistant'][0]]['service_backend_port'] | default('8123') }}"

  tasks:
    - name: "Homeassistant (Stage 1) - Deploy Supervisor API helper"
      ansible.builtin.copy:
        src: files/ha_supervisor_api.py
        dest: /usr/local/bin/ha_supervisor_api.py
        mode: '0755'

    - name: "Homeassistant (Stage 1) - Complete onboarding"
      include_tasks: tasks/stage1/onboarding.yml

    - name: "Homeassistant (Stage 1) - Configure static IP"
      include_tasks: tasks/stage1/configure_network.yml

    # --- Stage 1 health check ---
    - name: "Homeassistant (Stage 1) - Verify HA API on static IP"
      ansible.builtin.uri:
        url: "http://{{ hostvars[item]['ansible_host'] }}:{{ ha_port }}/api/config"
        method: GET
        headers:
          Authorization: "Bearer {{ ha_tokens[item] }}"
        status_code: [200]
        timeout: 30
      register: stage1_health
      retries: 30
      delay: 10
      until:
        - stage1_health.status is defined
        - stage1_health.status == 200
      loop: "{{ groups['homeassistant'] }}"
      when: item in ha_tokens

    - name: "Homeassistant (Stage 1) - Show Stage 1 result"
      ansible.builtin.debug:
        msg: >-
          Stage 1 complete – HA {{ item.json.version }}
          running on {{ hostvars[item.item]['ansible_host'] }}
          (state: {{ item.json.state }})
      loop: "{{ stage1_health.results }}"
      loop_control:
        label: "{{ item.item }}"
      when:
        - item.skipped is not defined or not item.skipped
        - item.status is defined and item.status == 200

    - name: "Homeassistant (Stage 1) - Restore from NAS backup"
      include_tasks: tasks/stage1/restore_from_backup.yml


# ╔════════════════════════════════════════════════════════════╗
# ║  STAGE 2 – Backup & Restore Infrastructure               ║
# ╚════════════════════════════════════════════════════════════╝

- name: "Homeassistant (Stage 2) - Deploy backup infrastructure"
  hosts: localhost
  become: yes
  gather_facts: no
  tags: [stage2, backup]
  vars_files:
    - "../../inventory/group_vars/all.yml"
  vars:
    ha_port: "{{ hostvars[groups['homeassistant'][0]]['service_backend_port'] | default('8123') }}"

  tasks:
    - name: "Homeassistant (Stage 2) - Setup backup configuration"
      include_tasks: tasks/stage2/setup_backup.yml


# ╔════════════════════════════════════════════════════════════╗
# ║  STAGE 3 – HA Configuration                              ║
# ╚════════════════════════════════════════════════════════════╝

- name: "Homeassistant (Stage 3) - Configure Home Assistant"
  hosts: localhost
  become: yes
  gather_facts: no
  tags: [stage3]
  vars_files:
    - "../../inventory/group_vars/all.yml"
  vars:
    ha_port: "{{ hostvars[groups['homeassistant'][0]]['service_backend_port'] | default('8123') }}"

  tasks:
    - name: "Homeassistant (Stage 3) - Configure core settings"
      include_tasks: tasks/stage3/configure_core.yml

    - name: "Homeassistant (Stage 3) - Create users"
      include_tasks: tasks/stage3/create_users.yml

    - name: "Homeassistant (Stage 3) - Configure reverse proxy"
      include_tasks: tasks/stage3/configure_reverse_proxy.yml

    - name: "Homeassistant (Stage 3) - Install addons"
      include_tasks: tasks/stage3/install_addons.yml

    - name: "Homeassistant (Stage 3) - Refresh Zigbee devices (post-restore)"
      include_tasks: tasks/stage3/refresh_zigbee_devices.yml

    - name: "Homeassistant (Stage 3) - Configure MQTT"
      include_tasks: tasks/stage3/configure_mqtt.yml

    - name: "Homeassistant (Stage 3) - Reboot & healthcheck"
      include_tasks: tasks/stage3/reboot_and_healthcheck.yml

    # --- Stage 3 health check ---
    - name: "Homeassistant (Stage 3) - Verify HA API"
      ansible.builtin.uri:
        url: "http://{{ hostvars[item]['ansible_host'] }}:{{ ha_port }}/api/config"
        method: GET
        headers:
          Authorization: "Bearer {{ ha_tokens[item] }}"
        status_code: [200]
        timeout: 30
      register: stage3_health
      retries: 30
      delay: 10
      until:
        - stage3_health.status is defined
        - stage3_health.status == 200
      loop: "{{ groups['homeassistant'] }}"
      when: item in ha_tokens

    - name: "Homeassistant (Stage 3) - Show Stage 3 result"
      ansible.builtin.debug:
        msg: >-
          Stage 3 complete – HA {{ item.json.version }}
          on {{ hostvars[item.item]['ansible_host'] }}:
          timezone={{ item.json.time_zone }},
          country={{ item.json.country }},
          unit_system={{ item.json.unit_system.length | default('?') }}
      loop: "{{ stage3_health.results }}"
      loop_control:
        label: "{{ item.item }}"
      when:
        - item.skipped is not defined or not item.skipped
        - item.status is defined and item.status == 200


# ╔════════════════════════════════════════════════════════════╗
# ║  STAGE 4 – Create Backup                                 ║
# ╚════════════════════════════════════════════════════════════╝

- name: "Homeassistant (Stage 4) - Create full HA backup to NAS"
  hosts: localhost
  become: yes
  gather_facts: no
  tags: [stage4, backup]
  vars_files:
    - "../../inventory/group_vars/all.yml"
  vars:
    ha_port: "{{ hostvars[groups['homeassistant'][0]]['service_backend_port'] | default('8123') }}"

  tasks:
    - name: "Homeassistant (Stage 4) - Create backup"
      include_tasks: tasks/stage4/create_backup.yml
