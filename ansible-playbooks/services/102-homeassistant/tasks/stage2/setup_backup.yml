---
# ==============================================================================
# Tasks: Setup HA Native Backup with NAS Storage (via Proxmox host)
# ==============================================================================
# Configures HA's native backup system with automatic scheduling and
# retention policies.  Backups are created locally inside HAOS and then
# copied to the NAS via the Proxmox host's NFS share
# ({{ nas_backup_mount }}).  Stage 4 (create_backup) handles the copy.
#
# The NAS NFS export only allows the Proxmox host IP, so HAOS cannot
# mount it directly.
#
# Components configured:
#   1. Backup directory on NAS (via Proxmox host mount)
#   2. Local backup agent (hassio.local)
#   3. Schedule (daily, HA default time ~04:45)
#   4. Retention (configurable number of local copies)
#
# Idempotent: Safe to run on every playbook execution.
# ==============================================================================

# ------------------------------------------------------------------
# Ensure NAS backup directory exists (from Proxmox host)
# ------------------------------------------------------------------
- name: "Homeassistant (Stage 2) - Ensure NAS backup directory exists"
  ansible.builtin.file:
    path: "{{ nas_backup_mount }}/homeassistant/homeassistant"
    state: directory
    mode: '0750'
    owner: root
    group: root

# ------------------------------------------------------------------
# Check if backup config already matches desired state
# ------------------------------------------------------------------
- name: "Homeassistant (Stage 2) - Read current backup config"
  ansible.builtin.shell: >-
    python3 /usr/local/bin/ha_supervisor_api.py
    "http://{{ hostvars[groups['homeassistant'][0]]['ansible_host'] }}:{{ ha_port }}"
    "{{ ha_tokens[groups['homeassistant'][0]] }}"
    ws backup/config/info
  register: backup_config_current
  changed_when: false
  failed_when: false

- name: "Homeassistant (Stage 2) - Determine if backup update needed"
  ansible.builtin.set_fact:
    ha_backup_update_needed: >-
      {{ backup_config_current.rc | default(1) != 0
         or (backup_config_current.stdout | default('{}') | from_json).get('config', {}).get('schedule', {}).get('recurrence', '') != 'daily'
         or (backup_config_current.stdout | default('{}') | from_json).get('config', {}).get('retention', {}).get('copies', 0) | int != ha_backup_keep_count | int }}

# ------------------------------------------------------------------
# Configure HA's native backup schedule and retention (local only)
# ------------------------------------------------------------------
- name: "Homeassistant (Stage 2) - Configure native backup"
  ansible.builtin.shell: >-
    python3 /usr/local/bin/ha_supervisor_api.py
    "http://{{ hostvars[groups['homeassistant'][0]]['ansible_host'] }}:{{ ha_port }}"
    "{{ ha_tokens[groups['homeassistant'][0]] }}"
    ws backup/config/update
    '{{ _backup_config | to_json }}'
  vars:
    _backup_config:
      create_backup:
        agent_ids:
          - "hassio.local"
        include_addons: null
        include_all_addons: true
        include_database: true
        include_folders: null
        name: null
        password: null
      retention:
        copies: "{{ ha_backup_keep_count | int }}"
        days: null
      schedule:
        recurrence: "daily"
        time: null
  register: backup_config_update
  when: ha_backup_update_needed | bool

- name: "Homeassistant (Stage 2) - Verify backup configuration"
  ansible.builtin.shell: >-
    python3 /usr/local/bin/ha_supervisor_api.py
    "http://{{ hostvars[groups['homeassistant'][0]]['ansible_host'] }}:{{ ha_port }}"
    "{{ ha_tokens[groups['homeassistant'][0]] }}"
    ws backup/config/info
  register: backup_config_verify
  changed_when: false
  when: ha_backup_update_needed | bool

- name: "Homeassistant (Stage 2) - Assert backup schedule active"
  ansible.builtin.assert:
    that:
      - >-
        (backup_config_verify.stdout | default(backup_config_current.stdout) | from_json).config.schedule.recurrence == 'daily'
      - >-
        (backup_config_verify.stdout | default(backup_config_current.stdout) | from_json).config.create_backup.agent_ids | length >= 1
    fail_msg: "Native backup configuration was not applied correctly."
    success_msg: >-
      Native backup configured: schedule=daily,
      agents={{ (backup_config_verify.stdout | default(backup_config_current.stdout) | from_json).config.create_backup.agent_ids }},
      retention={{ (backup_config_verify.stdout | default(backup_config_current.stdout) | from_json).config.retention.copies }} copies

- name: "Homeassistant (Stage 2) - Show summary"
  ansible.builtin.debug:
    msg: >-
      Native backup infrastructure deployed:
      local agent=hassio.local,
      NAS copy via Proxmox host mount={{ nas_backup_mount }}/homeassistant/homeassistant,
      retention={{ ha_backup_keep_count }} copies,
      schedule=daily (HA default ~04:45)1 
