---
# ==============================================================================
# Tasks: Setup HA Native Backup with NAS Storage
# ==============================================================================
# Creates an NFS network mount inside HAOS for off-site backup storage
# and configures HA's native backup system (introduced in 2025.1) with
# automatic scheduling and retention policies.
#
# No custom scripts or cron jobs – uses HA's built-in backup manager.
#
# Components configured:
#   1. NFS mount inside HAOS (Supervisor /mounts API)
#   2. Backup agents (local + NAS)
#   3. Schedule (daily, HA default time ~04:45)
#   4. Retention (configurable number of copies)
#
# Cleanup: Removes legacy custom backup scripts and cron if present.
#
# Idempotent: Safe to run on every playbook execution.
# ==============================================================================

# ------------------------------------------------------------------
# Cleanup: Remove legacy custom backup infrastructure
# ------------------------------------------------------------------
- name: Remove legacy backup cron job (if exists)
  ansible.builtin.cron:
    name: "HA daily backup to NAS"
    user: root
    state: absent

- name: Remove legacy backup scripts (if exist)
  ansible.builtin.file:
    path: "{{ item }}"
    state: absent
  loop:
    - /usr/local/bin/ha_backup.sh
    - /usr/local/bin/ha_restore.sh

- name: Remove legacy refresh token file (if exists)
  ansible.builtin.file:
    path: /etc/ha_backup_refresh_token
    state: absent

# ------------------------------------------------------------------
# Ensure NAS backup directory exists (from Proxmox host)
# ------------------------------------------------------------------
- name: Ensure NAS backup directory for HA exists
  ansible.builtin.file:
    path: "{{ nas_backup_mount }}/homeassistant/homeassistant"
    state: directory
    mode: '0750'
    owner: root
    group: root

# ------------------------------------------------------------------
# Create NFS mount inside HAOS for backup storage
# ------------------------------------------------------------------
- name: Check existing HAOS network mounts
  ansible.builtin.shell: >-
    python3 /usr/local/bin/ha_supervisor_api.py
    "http://{{ hostvars[groups['homeassistant'][0]]['ansible_host'] }}:{{ ha_port }}"
    "{{ ha_tokens[groups['homeassistant'][0]] }}"
    GET /mounts
  register: haos_mounts_raw
  changed_when: false

- name: Determine if NAS backup mount already exists
  ansible.builtin.set_fact:
    haos_backup_mount_exists: >-
      {{ (haos_mounts_raw.stdout | from_json).mounts | default([])
         | selectattr('name', 'equalto', ha_backup_mount_name)
         | list | length > 0 }}

- name: Create NFS backup mount in HAOS
  ansible.builtin.shell: >-
    python3 /usr/local/bin/ha_supervisor_api.py
    "http://{{ hostvars[groups['homeassistant'][0]]['ansible_host'] }}:{{ ha_port }}"
    "{{ ha_tokens[groups['homeassistant'][0]] }}"
    POST /mounts
    '{{ _mount_payload | to_json }}'
  vars:
    _mount_payload:
      name: "{{ ha_backup_mount_name }}"
      type: "nfs"
      usage: "backup"
      server: "{{ nas_ip }}"
      path: "{{ nas_nfs_export }}/backups/homeassistant/homeassistant"
  register: mount_create_result
  when: not (haos_backup_mount_exists | bool)

- name: Wait for NFS mount to become available
  ansible.builtin.pause:
    seconds: 5
  when: not (haos_backup_mount_exists | bool)

# ------------------------------------------------------------------
# Verify the mount is active and backup agent is registered
# ------------------------------------------------------------------
- name: Verify backup agent for NAS mount is registered
  ansible.builtin.shell: >-
    python3 /usr/local/bin/ha_supervisor_api.py
    "http://{{ hostvars[groups['homeassistant'][0]]['ansible_host'] }}:{{ ha_port }}"
    "{{ ha_tokens[groups['homeassistant'][0]] }}"
    ws backup/agents/info
  register: backup_agents_raw
  changed_when: false
  retries: 12
  delay: 5
  until: >-
    (backup_agents_raw.stdout | from_json).agents | default([])
    | selectattr('agent_id', 'equalto', 'hassio.' + ha_backup_mount_name)
    | list | length > 0

- name: Show available backup agents
  ansible.builtin.debug:
    msg: >-
      Backup agents: {{ (backup_agents_raw.stdout | from_json).agents
                        | map(attribute='agent_id') | list }}

# ------------------------------------------------------------------
# Configure HA's native backup schedule and retention
# ------------------------------------------------------------------
- name: Configure native backup (schedule, retention, locations)
  ansible.builtin.shell: >-
    python3 /usr/local/bin/ha_supervisor_api.py
    "http://{{ hostvars[groups['homeassistant'][0]]['ansible_host'] }}:{{ ha_port }}"
    "{{ ha_tokens[groups['homeassistant'][0]] }}"
    ws backup/config/update
    '{{ _backup_config | to_json }}'
  vars:
    _backup_config:
      create_backup:
        agent_ids:
          - "hassio.local"
          - "hassio.{{ ha_backup_mount_name }}"
        include_addons: null
        include_all_addons: true
        include_database: true
        include_folders: null
        name: null
        password: null
      retention:
        copies: "{{ ha_backup_keep_count | int }}"
        days: null
      schedule:
        recurrence: "daily"
        time: null
  register: backup_config_update

- name: Verify backup configuration was applied
  ansible.builtin.shell: >-
    python3 /usr/local/bin/ha_supervisor_api.py
    "http://{{ hostvars[groups['homeassistant'][0]]['ansible_host'] }}:{{ ha_port }}"
    "{{ ha_tokens[groups['homeassistant'][0]] }}"
    ws backup/config/info
  register: backup_config_verify
  changed_when: false

- name: Assert backup schedule is active
  ansible.builtin.assert:
    that:
      - (backup_config_verify.stdout | from_json).config.schedule.recurrence == 'daily'
      - (backup_config_verify.stdout | from_json).config.create_backup.agent_ids | length >= 2
    fail_msg: "Native backup configuration was not applied correctly."
    success_msg: >-
      Native backup configured: schedule=daily,
      agents={{ (backup_config_verify.stdout | from_json).config.create_backup.agent_ids }},
      retention={{ (backup_config_verify.stdout | from_json).config.retention.copies }} copies

- name: Show Stage 2 summary
  ansible.builtin.debug:
    msg: >-
      Native backup infrastructure deployed:
      NAS mount={{ ha_backup_mount_name }} ({{ nas_ip }}:{{ nas_nfs_export }}/backups/homeassistant/homeassistant),
      agents=hassio.local + hassio.{{ ha_backup_mount_name }},
      retention={{ ha_backup_keep_count }} copies,
      schedule=daily (HA default ~04:45)
