---
# ==============================================================================
# Tasks: Create Initial HA Backup via Native Backup System
# ==============================================================================
# Triggers HA's built-in backup manager to create a full backup locally,
# then downloads it from HA and copies it to the NAS via the Proxmox
# host's already-mounted NFS share.
#
# The NAS NFS export only allows connections from the Proxmox host IP,
# so HAOS cannot write to the NAS directly.  The copy goes:
#   HAOS (local backup) → curl download → NAS mount on Proxmox host
#
# Old backups on NAS are rotated based on ha_backup_keep_count.
# ==============================================================================

- name: Check if NAS mount is available
  ansible.builtin.command: mountpoint -q {{ nas_mount }}
  register: nas_mount_check
  changed_when: false
  failed_when: false

- name: Fail if NAS is not mounted
  ansible.builtin.fail:
    msg: "NAS not mounted at {{ nas_mount }} – cannot create backup."
  when: nas_mount_check.rc != 0

# ------------------------------------------------------------------
# Create full backup via Supervisor API (local storage)
# ------------------------------------------------------------------
- name: Create initial full HA backup (local)
  ansible.builtin.shell: >-
    python3 /usr/local/bin/ha_supervisor_api.py
    "http://{{ hostvars[groups['homeassistant'][0]]['ansible_host'] }}:{{ ha_port }}"
    "{{ ha_tokens[groups['homeassistant'][0]] }}"
    POST /backups/new/full
    '{"name":"initial_setup_backup"}'
    --timeout 300
  register: backup_create
  changed_when: true

- name: Parse backup creation result
  ansible.builtin.set_fact:
    ha_new_backup_slug: "{{ (backup_create.stdout | from_json).slug | default('') }}"

- name: Fail if backup creation failed
  ansible.builtin.fail:
    msg: "Backup creation failed. Output: {{ backup_create.stdout | default('') }}"
  when: ha_new_backup_slug | length == 0

- name: Show backup slug
  ansible.builtin.debug:
    msg: "Backup created with slug: {{ ha_new_backup_slug }}"

# ------------------------------------------------------------------
# Download backup from HA and copy to NAS (via Proxmox host)
# ------------------------------------------------------------------
- name: Set NAS backup directory path
  ansible.builtin.set_fact:
    ha_nas_backup_dir: "{{ nas_backup_mount }}/homeassistant/homeassistant"

- name: Download backup from HA to NAS
  ansible.builtin.shell: |
    BACKUP_FILE="{{ ha_nas_backup_dir }}/{{ ha_new_backup_slug }}.tar"

    # Download backup from HA Supervisor API
    HTTP_CODE=$(curl -s -o "$BACKUP_FILE" -w "%{http_code}" \
      -H "Authorization: Bearer {{ ha_tokens[groups['homeassistant'][0]] }}" \
      "http://{{ hostvars[groups['homeassistant'][0]]['ansible_host'] }}:{{ ha_port }}/api/hassio/backups/{{ ha_new_backup_slug }}/download")

    if [ "$HTTP_CODE" != "200" ]; then
      echo "Download failed (HTTP $HTTP_CODE)"
      rm -f "$BACKUP_FILE"
      exit 1
    fi

    # Validate tar
    if ! tar -tf "$BACKUP_FILE" > /dev/null 2>&1; then
      echo "Downloaded file is not a valid tar"
      rm -f "$BACKUP_FILE"
      exit 1
    fi

    SIZE=$(stat -c%s "$BACKUP_FILE" 2>/dev/null || echo "0")
    echo "Backup copied to NAS ($SIZE bytes)"
  register: nas_copy_result
  changed_when: "'copied to NAS' in nas_copy_result.stdout"
  no_log: true

- name: Show NAS copy result
  ansible.builtin.debug:
    msg: "{{ nas_copy_result.stdout | default('NAS copy completed') }}"

# ------------------------------------------------------------------
# Rotate old backups on NAS (keep ha_backup_keep_count newest)
# ------------------------------------------------------------------
- name: Rotate old backups on NAS
  ansible.builtin.shell: |
    BACKUP_DIR="{{ ha_nas_backup_dir }}"
    KEEP={{ ha_backup_keep_count | int }}
    
    # List all .tar files sorted by modification time (newest first)
    FILES=$(ls -t "$BACKUP_DIR"/*.tar 2>/dev/null)
    COUNT=$(echo "$FILES" | grep -c . 2>/dev/null || echo "0")
    
    if [ "$COUNT" -le "$KEEP" ]; then
      echo "OK: $COUNT backup(s), keeping all (limit=$KEEP)"
      exit 0
    fi
    
    # Delete oldest files beyond the keep count
    DELETED=0
    echo "$FILES" | tail -n +$(( KEEP + 1 )) | while read -r OLD_FILE; do
      rm -f "$OLD_FILE"
      DELETED=$(( DELETED + 1 ))
      echo "Deleted: $(basename "$OLD_FILE")"
    done
    
    REMAINING=$(ls "$BACKUP_DIR"/*.tar 2>/dev/null | wc -l)
    echo "OK: Rotated down to $REMAINING backup(s) (limit=$KEEP)"
  register: rotate_result
  changed_when: "'Deleted:' in rotate_result.stdout"

- name: Show rotation result
  ansible.builtin.debug:
    msg: "{{ rotate_result.stdout }}"

# ------------------------------------------------------------------
# Final validation
# ------------------------------------------------------------------
- name: Validate backup on NAS
  ansible.builtin.shell: |
    BACKUP_DIR="{{ ha_nas_backup_dir }}"
    FILE_COUNT=$(find "$BACKUP_DIR" -name "*.tar" -type f 2>/dev/null | wc -l)
    if [ "$FILE_COUNT" -eq 0 ]; then
      echo "FAIL: No backup tar files found on NAS"
      exit 1
    fi
    NEWEST=$(ls -t "$BACKUP_DIR"/*.tar 2>/dev/null | head -1)
    SIZE=$(stat -c%s "$NEWEST" 2>/dev/null || echo "0")
    echo "OK: $FILE_COUNT backup(s) on NAS, newest=$(basename $NEWEST) ($SIZE bytes)"
  register: nas_validate
  changed_when: false

- name: Show final backup status
  ansible.builtin.debug:
    msg: >-
      Initial backup complete: {{ nas_validate.stdout | default('unknown') }}
