---
# ==============================================================================
# Tasks: Install Home Assistant Addons (Zigbee2MQTT + Matter Server)
# ==============================================================================
# Installs and configures:
#   1. Zigbee2MQTT – via community addon repository
#   2. Matter Server – official core addon
#
# Idempotent: checks addon status before installing/starting.
# Uses ha_supervisor_api.py for Supervisor API calls via WebSocket.
# ==============================================================================

# ------------------------------------------------------------------
# Variables
# ------------------------------------------------------------------
- name: Set addon slugs and repository
  ansible.builtin.set_fact:
    z2m_repository: "https://github.com/zigbee2mqtt/hassio-zigbee2mqtt"
    z2m_slug: "45df7312_zigbee2mqtt"
    matter_slug: "core_matter_server"

# ╔════════════════════════════════════════════════════════════╗
# ║  Zigbee2MQTT                                              ║
# ╚════════════════════════════════════════════════════════════╝

# --- Add community repository for Z2M ---
- name: Get current addon repositories
  ansible.builtin.command:
    cmd: >-
      python3 /usr/local/bin/ha_supervisor_api.py
        http://{{ hostvars[item]['ansible_host'] }}:{{ ha_port }}
        {{ ha_tokens[item] }}
        GET /store
  register: store_info
  changed_when: false
  loop: "{{ groups['homeassistant'] }}"
  when: item in ha_tokens

- name: Check if Z2M repository is already added
  ansible.builtin.set_fact:
    z2m_repo_present: >-
      {{ store_info.results
         | selectattr('stdout', 'defined')
         | map(attribute='stdout')
         | map('from_json')
         | map(attribute='repositories', default=[])
         | flatten
         | selectattr('url', 'defined')
         | selectattr('url', 'equalto', z2m_repository)
         | list
         | length > 0 }}

- name: Add Zigbee2MQTT addon repository
  ansible.builtin.command:
    cmd: >-
      python3 /usr/local/bin/ha_supervisor_api.py
        http://{{ hostvars[item]['ansible_host'] }}:{{ ha_port }}
        {{ ha_tokens[item] }}
        POST /store/repositories
        '{"repository": "{{ z2m_repository }}"}'
  register: add_repo
  changed_when: true
  loop: "{{ groups['homeassistant'] }}"
  when:
    - item in ha_tokens
    - not (z2m_repo_present | bool)

- name: Wait for addon store to refresh after adding repository
  ansible.builtin.pause:
    seconds: 10
  when: not (z2m_repo_present | bool)

# --- Install Zigbee2MQTT addon ---
- name: Check if Zigbee2MQTT addon is installed
  ansible.builtin.command:
    cmd: >-
      python3 /usr/local/bin/ha_supervisor_api.py
        http://{{ hostvars[item]['ansible_host'] }}:{{ ha_port }}
        {{ ha_tokens[item] }}
        GET /addons/{{ z2m_slug }}/info
  register: z2m_info
  changed_when: false
  failed_when: false
  loop: "{{ groups['homeassistant'] }}"
  when: item in ha_tokens

- name: Determine Z2M addon state
  ansible.builtin.set_fact:
    z2m_installed: >-
      {{ z2m_info.results
         | selectattr('rc', 'defined')
         | selectattr('rc', 'equalto', 0)
         | selectattr('stdout', 'defined')
         | map(attribute='stdout')
         | map('from_json')
         | rejectattr('version', 'none')
         | list | length > 0 }}
    z2m_running: >-
      {{ z2m_info.results
         | selectattr('rc', 'defined')
         | selectattr('rc', 'equalto', 0)
         | selectattr('stdout', 'defined')
         | map(attribute='stdout')
         | map('from_json')
         | selectattr('state', 'defined')
         | selectattr('state', 'equalto', 'started')
         | list | length > 0 }}

- name: Show Z2M addon state
  ansible.builtin.debug:
    msg: "Z2M – installed: {{ z2m_installed }}, running: {{ z2m_running }}"

- name: Install Zigbee2MQTT addon
  ansible.builtin.command:
    cmd: >-
      python3 /usr/local/bin/ha_supervisor_api.py
        http://{{ hostvars[item]['ansible_host'] }}:{{ ha_port }}
        {{ ha_tokens[item] }}
        POST /addons/{{ z2m_slug }}/install
        --timeout 180
  register: z2m_install
  retries: 6
  delay: 30
  until: >-
    z2m_install.rc == 0
    or 'already installed' in (z2m_install.stderr | default(''))
  failed_when:
    - z2m_install.rc != 0
    - "'already installed' not in (z2m_install.stderr | default(''))"
  loop: "{{ groups['homeassistant'] }}"
  when:
    - item in ha_tokens
    - not (z2m_installed | bool)

- name: Verify Z2M addon installation
  ansible.builtin.command:
    cmd: >-
      python3 /usr/local/bin/ha_supervisor_api.py
        http://{{ hostvars[item]['ansible_host'] }}:{{ ha_port }}
        {{ ha_tokens[item] }}
        GET /addons/{{ z2m_slug }}/info
  register: z2m_install_check
  retries: 12
  delay: 10
  until:
    - z2m_install_check.rc == 0
    - (z2m_install_check.stdout | from_json).get('version', None) is not none
  changed_when: false
  failed_when:
    - z2m_install_check.rc != 0 or (z2m_install_check.stdout | from_json).get('version', None) is none
  loop: "{{ groups['homeassistant'] }}"
  when:
    - item in ha_tokens
    - not (z2m_installed | bool)

# --- Configure Zigbee2MQTT addon ---
- name: Configure Zigbee2MQTT addon options
  ansible.builtin.command:
    argv:
      - python3
      - /usr/local/bin/ha_supervisor_api.py
      - "http://{{ hostvars[item]['ansible_host'] }}:{{ ha_port }}"
      - "{{ ha_tokens[item] }}"
      - POST
      - "/addons/{{ z2m_slug }}/options"
      - "{{ z2m_options | to_json }}"
  vars:
    z2m_options:
      options:
        data_path: "/config/zigbee2mqtt"
        socat:
          enabled: false
          master: "pty,raw,echo=0,link=/tmp/ttyZ2M,mode=777"
          slave: "tcp-listen:8485,keepalive,nodelay,reuseaddr,keepidle=1,keepintvl=1,keepcnt=5"
          options: "-d -d"
          log: false
        mqtt:
          server: "mqtt://{{ ha_z2m_mqtt_broker_ip }}:{{ hostvars['mqtt-broker']['service_backend_port'] | default('1883') }}"
          user: "{{ ha_z2m_mqtt_user }}"
          password: "{{ ha_z2m_mqtt_password }}"
        serial:
          port: "{{ ha_z2m_serial_port }}"
          adapter: "{{ ha_z2m_serial_adapter }}"
  register: z2m_config
  changed_when: z2m_config.rc == 0
  loop: "{{ groups['homeassistant'] }}"
  when: item in ha_tokens

# --- Start Zigbee2MQTT addon ---
- name: Start Zigbee2MQTT addon
  ansible.builtin.command:
    cmd: >-
      python3 /usr/local/bin/ha_supervisor_api.py
        http://{{ hostvars[item]['ansible_host'] }}:{{ ha_port }}
        {{ ha_tokens[item] }}
        POST /addons/{{ z2m_slug }}/start
  register: z2m_start
  loop: "{{ groups['homeassistant'] }}"
  when:
    - item in ha_tokens
    - not (z2m_running | bool)

- name: Enable Zigbee2MQTT auto-start, watchdog and sidebar panel
  ansible.builtin.command:
    cmd: >-
      python3 /usr/local/bin/ha_supervisor_api.py
        http://{{ hostvars[item]['ansible_host'] }}:{{ ha_port }}
        {{ ha_tokens[item] }}
        POST /addons/{{ z2m_slug }}/options
        '{"boot": "auto", "watchdog": true, "ingress_panel": true}'
  changed_when: true
  loop: "{{ groups['homeassistant'] }}"
  when: item in ha_tokens

# --- Fix Z2M configuration.yaml ---------------------------------------------------
# Z2M 2.x writes configuration.yaml with potentially unquoted YAML-special
# characters (', {, <, etc.) in the MQTT password, causing parse errors.
# Also disables the onboarding wizard and sets log level to info.
# Uses QEMU Guest Agent to patch the file directly on HAOS filesystem.
# ----------------------------------------------------------------------------------

- name: Wait for Z2M configuration.yaml to exist
  ansible.builtin.shell: >-
    qm guest exec {{ hostvars[item]['service_id'] }} --
    test -f /mnt/data/supervisor/homeassistant/zigbee2mqtt/configuration.yaml
  register: z2m_config_wait
  retries: 24
  delay: 5
  until: >-
    z2m_config_wait.rc == 0
    and (z2m_config_wait.stdout | from_json).get('exitcode', 1) == 0
  changed_when: false
  loop: "{{ groups['homeassistant'] }}"
  when: item in ha_tokens

- name: Fix Z2M configuration (onboarding + MQTT password quoting + log level)
  ansible.builtin.shell: |
    python3 << 'PYEOF'
    import json, subprocess, re, sys

    vmid = "{{ hostvars[item]['service_id'] }}"
    config_path = "/mnt/data/supervisor/homeassistant/zigbee2mqtt/configuration.yaml"

    # Read current config via QEMU Guest Agent
    result = subprocess.run(
        ["qm", "guest", "exec", vmid, "--", "cat", config_path],
        capture_output=True, text=True
    )
    data = json.loads(result.stdout)
    if data.get("exitcode", 1) != 0:
        print("SKIP")
        sys.exit(0)

    content = data["out-data"]
    original = content

    # 1. Disable onboarding wizard (Z2M 2.x sets this to true on first start)
    content = content.replace("onboarding: true", "onboarding: false")

    # 2. Quote MQTT password if it contains unquoted YAML-special characters
    #    Matches '  password: <value>' where value does NOT start with a quote
    content = re.sub(
        r'(  password: )([^"\n].*)',
        lambda m: m.group(1) + '"' + m.group(2) + '"',
        content
    )

    # 3. Set log level to info (Z2M default for new installs is often debug)
    content = content.replace("log_level: debug", "log_level: info")

    if content != original:
        proc = subprocess.run(
            ["qm", "guest", "exec", vmid, "--pass-stdin", "1", "--timeout", "60",
             "--", "/bin/sh", "-c", "cat > " + config_path],
            input=content, text=True, capture_output=True
        )
        write_result = json.loads(proc.stdout)
        if write_result.get("exitcode", 1) == 0:
            print("CHANGED")
        else:
            print("WRITE_FAILED: " + proc.stdout)
            sys.exit(1)
    else:
        print("OK")
    PYEOF
  register: z2m_config_fix
  changed_when: "'CHANGED' in z2m_config_fix.stdout"
  loop: "{{ groups['homeassistant'] }}"
  when: item in ha_tokens

- name: Restart Z2M addon after configuration fix
  ansible.builtin.command:
    cmd: >-
      python3 /usr/local/bin/ha_supervisor_api.py
        http://{{ hostvars[item]['ansible_host'] }}:{{ ha_port }}
        {{ ha_tokens[item] }}
        POST /addons/{{ z2m_slug }}/restart
        --timeout 60
  loop: "{{ groups['homeassistant'] }}"
  when:
    - item in ha_tokens
    - z2m_config_fix is changed

- name: Wait for Z2M to connect to MQTT after restart
  ansible.builtin.pause:
    seconds: 15
  when: z2m_config_fix is changed

# ╔════════════════════════════════════════════════════════════╗
# ║  Matter Server                                            ║
# ╚════════════════════════════════════════════════════════════╝

- name: Wait for Supervisor to settle after Z2M operations
  ansible.builtin.pause:
    seconds: 15
  when: not (z2m_installed | bool)

- name: Check if Matter Server addon is installed
  ansible.builtin.command:
    cmd: >-
      python3 /usr/local/bin/ha_supervisor_api.py
        http://{{ hostvars[item]['ansible_host'] }}:{{ ha_port }}
        {{ ha_tokens[item] }}
        GET /addons/{{ matter_slug }}/info
  register: matter_info
  changed_when: false
  failed_when: false
  loop: "{{ groups['homeassistant'] }}"
  when: item in ha_tokens

- name: Determine Matter addon state
  ansible.builtin.set_fact:
    matter_installed: >-
      {{ matter_info.results
         | selectattr('rc', 'defined')
         | selectattr('rc', 'equalto', 0)
         | selectattr('stdout', 'defined')
         | map(attribute='stdout')
         | map('from_json')
         | rejectattr('version', 'none')
         | list | length > 0 }}
    matter_running: >-
      {{ matter_info.results
         | selectattr('rc', 'defined')
         | selectattr('rc', 'equalto', 0)
         | selectattr('stdout', 'defined')
         | map(attribute='stdout')
         | map('from_json')
         | selectattr('state', 'defined')
         | selectattr('state', 'equalto', 'started')
         | list | length > 0 }}

- name: Show Matter addon state
  ansible.builtin.debug:
    msg: "Matter – installed: {{ matter_installed }}, running: {{ matter_running }}"

- name: Install Matter Server addon
  ansible.builtin.command:
    cmd: >-
      python3 /usr/local/bin/ha_supervisor_api.py
        http://{{ hostvars[item]['ansible_host'] }}:{{ ha_port }}
        {{ ha_tokens[item] }}
        POST /addons/{{ matter_slug }}/install
        --timeout 180
  register: matter_install
  retries: 6
  delay: 30
  until: >-
    matter_install.rc == 0
    or 'already installed' in (matter_install.stderr | default(''))
  failed_when:
    - matter_install.rc != 0
    - "'already installed' not in (matter_install.stderr | default(''))"
  loop: "{{ groups['homeassistant'] }}"
  when:
    - item in ha_tokens
    - not (matter_installed | bool)

- name: Verify Matter Server addon installation
  ansible.builtin.command:
    cmd: >-
      python3 /usr/local/bin/ha_supervisor_api.py
        http://{{ hostvars[item]['ansible_host'] }}:{{ ha_port }}
        {{ ha_tokens[item] }}
        GET /addons/{{ matter_slug }}/info
  register: matter_install_check
  retries: 12
  delay: 10
  until:
    - matter_install_check.rc == 0
    - (matter_install_check.stdout | from_json).get('version', None) is not none
  changed_when: false
  failed_when:
    - matter_install_check.rc != 0 or (matter_install_check.stdout | from_json).get('version', None) is none
  loop: "{{ groups['homeassistant'] }}"
  when:
    - item in ha_tokens
    - not (matter_installed | bool)

# --- Start Matter Server addon ---
- name: Start Matter Server addon
  ansible.builtin.command:
    cmd: >-
      python3 /usr/local/bin/ha_supervisor_api.py
        http://{{ hostvars[item]['ansible_host'] }}:{{ ha_port }}
        {{ ha_tokens[item] }}
        POST /addons/{{ matter_slug }}/start
  register: matter_start
  loop: "{{ groups['homeassistant'] }}"
  when:
    - item in ha_tokens
    - not (matter_running | bool)

- name: Enable Matter Server auto-start, watchdog and sidebar panel
  ansible.builtin.command:
    cmd: >-
      python3 /usr/local/bin/ha_supervisor_api.py
        http://{{ hostvars[item]['ansible_host'] }}:{{ ha_port }}
        {{ ha_tokens[item] }}
        POST /addons/{{ matter_slug }}/options
        '{"boot": "auto", "watchdog": true, "ingress_panel": true}'
  changed_when: true
  loop: "{{ groups['homeassistant'] }}"
  when: item in ha_tokens

# ╔════════════════════════════════════════════════════════════╗
# ║  Verify Addons                                            ║
# ╚════════════════════════════════════════════════════════════╝

- name: Wait for addons to start
  ansible.builtin.pause:
    seconds: 15

- name: Verify Zigbee2MQTT addon is running
  ansible.builtin.command:
    cmd: >-
      python3 /usr/local/bin/ha_supervisor_api.py
        http://{{ hostvars[item]['ansible_host'] }}:{{ ha_port }}
        {{ ha_tokens[item] }}
        GET /addons/{{ z2m_slug }}/info
  register: z2m_verify
  changed_when: false
  loop: "{{ groups['homeassistant'] }}"
  when: item in ha_tokens

- name: Verify Matter Server addon is running
  ansible.builtin.command:
    cmd: >-
      python3 /usr/local/bin/ha_supervisor_api.py
        http://{{ hostvars[item]['ansible_host'] }}:{{ ha_port }}
        {{ ha_tokens[item] }}
        GET /addons/{{ matter_slug }}/info
  register: matter_verify
  changed_when: false
  loop: "{{ groups['homeassistant'] }}"
  when: item in ha_tokens

- name: Show addon status
  ansible.builtin.debug:
    msg: >-
      Addons – Z2M: {{ (z2m_verify.results[0].stdout | from_json).state | default('unknown') }},
      Matter: {{ (matter_verify.results[0].stdout | from_json).state | default('unknown') }}

# ╔════════════════════════════════════════════════════════════╗
# ║  Handle Discovered Integrations (ZHA + Matter)            ║
# ╚════════════════════════════════════════════════════════════╝
# After addons start, HA auto-discovers:
#   1. ZHA – detects SONOFF USB dongle, offers ZHA setup.
#      Since Z2M handles the dongle, we IGNORE this discovery.
#   2. Matter – detects Matter Server addon via mDNS/zeroconf.
#      We ACCEPT this flow to create the Matter integration.
# These run idempotently – skip if already handled.

- name: Get current discovery flows and config entries
  ansible.builtin.shell: |
    python3 << 'PYEOF'
    import json, sys
    sys.path.insert(0, '/usr/local/bin')
    import websocket

    ha_url = "ws://{{ hostvars[item]['ansible_host'] }}:{{ ha_port }}/api/websocket"
    token = "{{ ha_tokens[item] }}"

    ws = websocket.create_connection(ha_url)
    ws.recv()  # auth_required
    ws.send(json.dumps({"type": "auth", "access_token": token}))
    ws.recv()  # auth_ok

    # Get discovery flow progress
    ws.send(json.dumps({"id": 1, "type": "config_entries/flow/progress"}))
    flows_result = json.loads(ws.recv())
    flows = flows_result.get("result", [])

    # Get existing config entries
    ws.send(json.dumps({"id": 2, "type": "config_entries/get"}))
    entries_result = json.loads(ws.recv())
    entries = entries_result.get("result", [])

    ws.close()

    output = {
        "flows": flows,
        "zha_ignored": any(e["domain"] == "zha" and e.get("source") == "ignore" for e in entries),
        "matter_configured": any(e["domain"] == "matter" and e.get("state") == "loaded" for e in entries),
    }
    print(json.dumps(output))
    PYEOF
  register: discovery_state
  changed_when: false
  loop: "{{ groups['homeassistant'] }}"
  when: item in ha_tokens

- name: Parse discovery state
  ansible.builtin.set_fact:
    _disc: "{{ (discovery_state.results | first).stdout | from_json }}"

- name: Show discovery state
  ansible.builtin.debug:
    msg: >-
      Discovery – ZHA ignored: {{ _disc.zha_ignored }},
      Matter configured: {{ _disc.matter_configured }},
      Pending flows: {{ _disc.flows | length }}

# --- Ignore ZHA USB discovery (SONOFF dongle is managed by Z2M) ---
- name: Ignore ZHA discovery for USB dongle
  ansible.builtin.shell: |
    python3 << 'PYEOF'
    import json, sys
    sys.path.insert(0, '/usr/local/bin')
    import websocket

    ha_url = "ws://{{ hostvars[item]['ansible_host'] }}:{{ ha_port }}/api/websocket"
    token = "{{ ha_tokens[item] }}"

    # Find ZHA flow from discovery state
    flows = json.loads('{{ _disc.flows | to_json }}')
    zha_flows = [f for f in flows if f.get("handler") == "zha"]

    if not zha_flows:
        print("SKIP – no ZHA discovery flow")
        sys.exit(0)

    ws = websocket.create_connection(ha_url)
    ws.recv()
    ws.send(json.dumps({"type": "auth", "access_token": token}))
    ws.recv()

    for i, flow in enumerate(zha_flows):
        ws.send(json.dumps({
            "id": i + 1,
            "type": "config_entries/ignore_flow",
            "flow_id": flow["flow_id"],
            "title": "SONOFF Dongle Plus MG24 (used by Zigbee2MQTT)"
        }))
        result = json.loads(ws.recv())
        if result.get("success"):
            print("CHANGED – ignored ZHA flow " + flow["flow_id"])
        else:
            print("FAILED – " + json.dumps(result))

    ws.close()
    PYEOF
  register: zha_ignore
  changed_when: "'CHANGED' in zha_ignore.stdout"
  loop: "{{ groups['homeassistant'] }}"
  when:
    - item in ha_tokens
    - not (_disc.zha_ignored | bool)

# --- Accept Matter Server discovery (create integration entry) ---
- name: Accept Matter Server discovery
  ansible.builtin.uri:
    url: "http://{{ hostvars[item]['ansible_host'] }}:{{ ha_port }}/api/config/config_entries/flow/{{ _matter_flow_id }}"
    method: POST
    headers:
      Authorization: "Bearer {{ ha_tokens[item] }}"
    body_format: json
    body: {}
    status_code: [200]
    timeout: 30
  vars:
    _matter_flows: >-
      {{ _disc.flows | selectattr('handler', 'equalto', 'matter') | list }}
    _matter_flow_id: "{{ (_matter_flows | first).flow_id }}"
  register: matter_accept
  loop: "{{ groups['homeassistant'] }}"
  when:
    - item in ha_tokens
    - not (_disc.matter_configured | bool)
    - _disc.flows | selectattr('handler', 'equalto', 'matter') | list | length > 0

- name: Show Matter integration result
  ansible.builtin.debug:
    msg: >-
      Matter integration: {{ 'already configured' if (_disc.matter_configured | bool)
      else ('created – ' + (matter_accept.results | first).json.title | default('accepted'))
      if matter_accept is defined and matter_accept.results is defined
      and (matter_accept.results | first).status | default(0) == 200
      else 'no discovery flow found' }}
