---
# ==============================================================================
# Tasks: Detect VM IP and wait for HA API
# ==============================================================================
# Uses the QEMU Guest Agent (via qm guest cmd – no Ansible module for this)
# to detect the VM's DHCP IP, then waits for the HA API to be ready.
# ==============================================================================

- name: "Homeassistant (Stage 1) - Wait for QEMU Guest Agent"
  ansible.builtin.command: "qm guest cmd {{ hostvars[item]['service_id'] }} ping"
  register: agent_ping
  retries: 30
  delay: 10
  until: agent_ping.rc == 0
  changed_when: false
  loop: "{{ groups['homeassistant'] }}"

- name: "Homeassistant (Stage 1) - Detect VM IP address"
  ansible.builtin.shell: >-
    qm guest cmd {{ hostvars[item]['service_id'] }} network-get-interfaces
    | jq -r '[.[] | select(.name != "lo") | ."ip-addresses"[]?
    | select(."ip-address-type" == "ipv4")] | .[0]."ip-address"'
  register: detected_ips
  changed_when: false
  loop: "{{ groups['homeassistant'] }}"

- name: "Homeassistant (Stage 1) - Store detected IPs"
  ansible.builtin.set_fact:
    ha_initial_ips: "{{ ha_initial_ips | default({}) | combine({item.item: item.stdout | trim}) }}"
  loop: "{{ detected_ips.results }}"
  when: item.stdout | trim | length > 0

- name: "Homeassistant (Stage 1) - Show detected VM IPs"
  ansible.builtin.debug:
    msg: "{{ item }} – Current IP: {{ ha_initial_ips[item] }} | Target static IP: {{ hostvars[item]['ansible_host'] }}"
  loop: "{{ groups['homeassistant'] }}"
  when: item in (ha_initial_ips | default({}))

- name: "Homeassistant (Stage 1) - Wait for HA Core installation"
  ansible.builtin.command: >
    qm guest exec {{ hostvars[item]['service_id'] }} --
    ha core info
  register: ha_core_info
  retries: 60
  delay: 15
  until: >
    ha_core_info.rc == 0 and
    'landingpage' not in (ha_core_info.stdout | default(''))
  changed_when: false
  failed_when: false
  loop: "{{ groups['homeassistant'] }}"

- name: "Homeassistant (Stage 1) - Wait for HA API"
  ansible.builtin.uri:
    url: "http://{{ ha_initial_ips[item] }}:{{ ha_port | default('8123') }}/api/"
    method: GET
    status_code: [200, 401]
    timeout: 10
  register: ha_api_check
  retries: 60
  delay: 10
  until: ha_api_check.status in [200, 401]
  loop: "{{ groups['homeassistant'] }}"

- name: "Homeassistant (Stage 1) - Add DNS entry to /etc/hosts"
  ansible.builtin.lineinfile:
    path: /etc/hosts
    regexp: "\\s+{{ item }}$"
    line: "{{ hostvars[item]['ansible_host'] }} {{ item }}"
    state: present
    mode: '0644'
  loop: "{{ groups['homeassistant'] }}"
