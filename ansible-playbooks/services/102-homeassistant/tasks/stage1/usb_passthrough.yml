---
# ==============================================================================
# Tasks: USB Passthrough – Auto-detect and pass through Zigbee dongles
# ==============================================================================
# Scans the host USB bus for known Zigbee dongles and configures them
# as passthrough devices on the HA VM via the Proxmox API.
#
# Modules used:
#   - ansible.builtin.command         (lsusb, qm set – API token lacks USB perms)
#
# Expects module_defaults for group/community.proxmox.proxmox to be set.
# ==============================================================================

- name: "Homeassistant (Stage 1) - Scan USB bus"
  ansible.builtin.command: lsusb
  register: lsusb_output
  changed_when: false

- name: "Homeassistant (Stage 1) - Auto-detect Zigbee dongles"
  ansible.builtin.set_fact:
    ha_detected_usb_devices: >-
      {{ ha_known_zigbee_dongles
         | selectattr('vid_pid', 'in', lsusb_output.stdout)
         | map(attribute='vid_pid')
         | list }}

- name: "Homeassistant (Stage 1) - Show detected USB dongles"
  ansible.builtin.debug:
    msg: |
      Detected {{ ha_detected_usb_devices | length }} known dongle(s): {{ ha_detected_usb_devices | join(', ') }}
      {% if ha_detected_usb_devices | length == 0 %}
      WARNING: No known Zigbee dongle found!
      Known IDs searched: {{ ha_known_zigbee_dongles | map(attribute='vid_pid') | join(', ') }}
      Connected USB: {{ lsusb_output.stdout_lines | join(', ') }}
      {% endif %}

- name: "Homeassistant (Stage 1) - Merge USB device lists"
  ansible.builtin.set_fact:
    ha_usb_final_devices: >-
      {{ (ha_detected_usb_devices + ha_usb_extra_devices) | unique | list }}

# Build a single USB passthrough dictionary: { usb0: "host=VID:PID,usb3=1", usb1: ... }
- name: "Homeassistant (Stage 1) - Build USB passthrough config"
  ansible.builtin.set_fact:
    _usb_passthrough: "{{ _usb_passthrough | default({}) | combine({'usb' ~ idx: 'host=' ~ item ~ ',usb3=1'}) }}"
  loop: "{{ ha_usb_final_devices }}"
  loop_control:
    index_var: idx
  when: ha_usb_final_devices | length > 0

# NOTE: The Proxmox API forbids setting real USB device passthrough with token auth
# ("only root can set 'usb0' config for real devices"). Fall back to qm set.
- name: "Homeassistant (Stage 1) - Apply USB passthrough"
  ansible.builtin.command: >-
    qm set {{ hostvars[item]['service_id'] }}
    {% for key, val in _usb_passthrough.items() %}
    --{{ key }} {{ val }}{{ ' ' if not loop.last else '' }}
    {% endfor %}
  loop: "{{ groups['homeassistant'] }}"
  when:
    - _usb_passthrough is defined
    - _usb_passthrough | length > 0
  register: usb_set_result
  changed_when: "'update VM' in usb_set_result.stdout"

- name: "Homeassistant (Stage 1) - Warn if no USB devices found"
  ansible.builtin.debug:
    msg: >
      WARNING: No USB devices passed through to HA VM!
      Plug in your Zigbee dongle and re-run, or add the device ID
      manually to 'ha_usb_extra_devices' in group_vars/all.yml.
      Find IDs with: lsusb
  when: ha_usb_final_devices | length == 0
