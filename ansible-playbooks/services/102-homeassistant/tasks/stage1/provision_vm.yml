---
# ==============================================================================
# Tasks: Provision HAOS VM on Proxmox
# ==============================================================================
# Downloads the HAOS image, creates a UEFI KVM VM via the Proxmox API
# modules, imports the disk, and starts the VM.
#
# Modules used:
#   - community.proxmox.proxmox_kvm   (VM shell: UEFI, CPU, RAM, NIC)
#   - community.proxmox.proxmox_disk  (disk import via import_from + resize)
#   - ansible.builtin.uri / get_url   (GitHub release + image download)
#   - ansible.builtin.command          (xz decompress – no module for this)
#
# All steps are idempotent – existing VMs / disks are skipped.
# Expects module_defaults for group/community.proxmox.proxmox to be set
# in the calling play (api_host, api_user, api_token_id, api_token_secret).
# ==============================================================================

# ------------------------------------------------------------------
# Resolve latest stable HAOS version from GitHub (unless pinned)
# ------------------------------------------------------------------
- name: Resolve latest stable HAOS release from GitHub
  ansible.builtin.uri:
    url: https://api.github.com/repos/home-assistant/operating-system/releases
    method: GET
    return_content: yes
    status_code: [200]
    timeout: 30
    headers:
      Accept: application/vnd.github+json
  register: haos_releases
  when: ha_os_version is not defined

- name: Set ha_os_version to latest stable release
  ansible.builtin.set_fact:
    ha_os_version: >-
      {{ haos_releases.json
         | rejectattr('prerelease')
         | rejectattr('draft')
         | map(attribute='tag_name')
         | first }}
  when: ha_os_version is not defined

- name: Set HAOS image download URL
  ansible.builtin.set_fact:
    ha_image_url: "https://github.com/home-assistant/operating-system/releases/download/{{ ha_os_version }}/haos_ova-{{ ha_os_version }}.qcow2.xz"

- name: Show resolved HAOS version
  ansible.builtin.debug:
    msg: "Using HAOS version {{ ha_os_version }} – {{ ha_image_url }}"

# ------------------------------------------------------------------
# Download HAOS image (only if missing)
# ------------------------------------------------------------------
- name: Ensure download directory exists
  ansible.builtin.file:
    path: "{{ ha_image_download_dir }}"
    state: directory
    mode: '0755'

- name: Check if HAOS image already exists
  ansible.builtin.stat:
    path: "{{ ha_image_download_dir }}/haos_ova-{{ ha_os_version }}.qcow2"
  register: haos_image

- name: Download HAOS qcow2 image (compressed)
  ansible.builtin.get_url:
    url: "{{ ha_image_url }}"
    dest: "{{ ha_image_download_dir }}/haos_ova-{{ ha_os_version }}.qcow2.xz"
    mode: '0644'
  when: not haos_image.stat.exists

- name: Decompress HAOS image
  ansible.builtin.command:
    cmd: "xz -d -k {{ ha_image_download_dir }}/haos_ova-{{ ha_os_version }}.qcow2.xz"
    creates: "{{ ha_image_download_dir }}/haos_ova-{{ ha_os_version }}.qcow2"
  when: not haos_image.stat.exists

# ------------------------------------------------------------------
# VM creation via Proxmox API (idempotent – skips existing VMs)
# ------------------------------------------------------------------
- name: Create HAOS VM via Proxmox API
  community.proxmox.proxmox_kvm:
    vmid: "{{ hostvars[item]['service_id'] }}"
    name: "{{ item }}"
    node: "{{ proxmox_node }}"
    state: present
    # Hardware
    memory: "{{ ha_vm_memory }}"
    cores: "{{ ha_vm_cores }}"
    cpu: "{{ ha_vm_cpu_type }}"
    bios: ovmf
    machine: q35
    ostype: l26
    agent: "1"
    scsihw: virtio-scsi-pci
    onboot: true
    # Network
    net:
      net0: "virtio,bridge={{ ha_vm_bridge }}{{ ',macaddr=' + ha_vm_mac if ha_vm_mac | default('') | length > 0 else '' }}"
    # UEFI firmware disk
    efidisk0:
      storage: "{{ default_storage }}"
      format: raw
      efitype: 4m
      pre_enrolled_keys: false
    # Boot order (scsi0 will be attached next)
    boot: "order=scsi0"
  loop: "{{ groups['homeassistant'] }}"

# ------------------------------------------------------------------
# Import HAOS disk image & attach as scsi0
# ------------------------------------------------------------------
# NOTE: community.proxmox.proxmox_disk import_from with absolute paths
# requires root password auth (not token auth). Since we use API tokens,
# we fall back to the qm CLI for disk import. This is the only step
# that cannot use the Proxmox API module.
# ------------------------------------------------------------------
- name: Check if scsi0 disk is already attached
  ansible.builtin.command: "qm config {{ hostvars[item]['service_id'] }}"
  register: vm_config
  changed_when: false
  loop: "{{ groups['homeassistant'] }}"

- name: Import HAOS disk image into VM
  ansible.builtin.command: >-
    qm importdisk {{ hostvars[item.item]['service_id'] }}
    {{ ha_image_download_dir }}/haos_ova-{{ ha_os_version }}.qcow2 {{ default_storage }}
  when: "'scsi0:' not in item.stdout"
  loop: "{{ vm_config.results }}"
  loop_control:
    label: "{{ item.item }}"

- name: Attach imported disk as scsi0
  ansible.builtin.command: >-
    qm set {{ hostvars[item.item]['service_id'] }}
    --scsi0 {{ default_storage }}:vm-{{ hostvars[item.item]['service_id'] }}-disk-1
  when: "'scsi0:' not in item.stdout"
  loop: "{{ vm_config.results }}"
  loop_control:
    label: "{{ item.item }}"

# Resize via Proxmox API module (works with token auth on existing disks)
- name: Resize HAOS disk to desired size
  community.proxmox.proxmox_disk:
    vmid: "{{ hostvars[item]['service_id'] }}"
    disk: scsi0
    size: "{{ ha_vm_disk_size }}"
    state: resized
  loop: "{{ groups['homeassistant'] }}"

# ------------------------------------------------------------------
# Start VM via Proxmox API (idempotent – skips if already running)
# ------------------------------------------------------------------
- name: Start Home Assistant VM
  community.proxmox.proxmox_kvm:
    vmid: "{{ hostvars[item]['service_id'] }}"
    node: "{{ proxmox_node }}"
    state: started
    timeout: 120
  loop: "{{ groups['homeassistant'] }}"
