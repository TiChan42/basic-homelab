---
# ==============================================================================
# Tasks: Restore Home Assistant from NAS backup (native backup system)
# ==============================================================================
# Runs AFTER onboarding + static IP and BEFORE any addon/configuration.
# Uses HA's native backup system:
#
# Flow:
# 1. Check entity count (overwrite protection: skip if >50 entities)
# 2. Check NAS for backup files (from Proxmox host filesystem)
# 3. Create NFS mount inside HAOS pointing to NAS backup directory
# 4. Wait for HAOS to discover backups via the mount
# 5. Find the newest full backup in the Supervisor backup list
# 6. Trigger restore via Supervisor API
# 7. Wait for HA to come back
# 8. Re-authenticate (restore replaces the auth database)
# 9. Set ha_restored_from_backup=true so subsequent tasks can skip
#
# If HAOS cannot discover backups via the mount (e.g. NFS issue from
# inside the VM), falls back to uploading from the Proxmox host.
# ==============================================================================

- name: Initialize restore tracking
  set_fact:
    ha_restored_from_backup: false

# ------------------------------------------------------------------
# Ensure ha_initial_ips maps to current (static) IP
# ------------------------------------------------------------------
- name: Update ha_initial_ips to static IPs
  ansible.builtin.set_fact:
    ha_initial_ips: "{{ ha_initial_ips | default({}) | combine({item: hostvars[item]['ansible_host']}) }}"
  loop: "{{ groups['homeassistant'] }}"

# ------------------------------------------------------------------
# Pre-flight: should we attempt a restore?
# ------------------------------------------------------------------
- name: Check current HA entity count (overwrite protection)
  uri:
    url: "http://{{ ha_initial_ips[item] }}:{{ ha_port | default('8123') }}/api/states"
    method: GET
    headers:
      Authorization: "Bearer {{ ha_tokens[item] }}"
    status_code: [200]
    timeout: 30
  register: ha_states_check
  loop: "{{ groups['homeassistant'] }}"
  when: item in ha_tokens

- name: Evaluate if restore is needed
  set_fact:
    ha_restore_needed: >-
      {{ ha_states_check.results
         | selectattr('json', 'defined')
         | map(attribute='json')
         | map('length')
         | list | first | default(0) | int <= 50 }}

- name: Show restore decision
  debug:
    msg: >-
      {{ 'HA has few entities (' +
         (ha_states_check.results | selectattr('json', 'defined')
          | map(attribute='json') | map('length') | list | first | default(0) | string) +
         ') – will attempt restore from NAS backup.'
         if ha_restore_needed | bool
         else 'HA already has data – skipping restore.' }}

# ------------------------------------------------------------------
# Check NAS for backup files (from Proxmox host filesystem)
# ------------------------------------------------------------------
- name: Check for backup files on NAS
  ansible.builtin.find:
    paths: "{{ nas_backup_mount }}/homeassistant/homeassistant"
    patterns: "*.tar"
    file_type: file
  register: nas_backup_files
  when: ha_restore_needed | bool

- name: Evaluate NAS backup availability
  set_fact:
    ha_nas_has_backups: "{{ (nas_backup_files.files | default([]) | length) > 0 }}"
    ha_nas_newest_backup: >-
      {{ (nas_backup_files.files | default([])
          | sort(attribute='mtime', reverse=true)
          | first).path | default('') }}
  when: ha_restore_needed | bool

- name: Show NAS backup status
  debug:
    msg: >-
      {{ 'Found ' + (nas_backup_files.files | default([]) | length | string) +
         ' backup(s) on NAS. Newest: ' + (ha_nas_newest_backup | default('none'))
         if ha_nas_has_backups | default(false) | bool
         else 'No backup files found on NAS – proceeding with fresh install.' }}
  when: ha_restore_needed | bool

# ------------------------------------------------------------------
# Create HAOS NFS mount for backup discovery
# ------------------------------------------------------------------
- name: Check existing HAOS mounts
  ansible.builtin.shell: >-
    python3 /usr/local/bin/ha_supervisor_api.py
    "http://{{ ha_initial_ips[groups['homeassistant'][0]] }}:{{ ha_port | default('8123') }}"
    "{{ ha_tokens[groups['homeassistant'][0]] }}"
    GET /mounts
  register: restore_mounts_raw
  changed_when: false
  when:
    - ha_restore_needed | bool
    - ha_nas_has_backups | default(false) | bool

- name: Determine if NAS backup mount exists
  set_fact:
    restore_mount_exists: >-
      {{ (restore_mounts_raw.stdout | from_json).mounts | default([])
         | selectattr('name', 'equalto', ha_backup_mount_name)
         | list | length > 0 }}
  when:
    - ha_restore_needed | bool
    - ha_nas_has_backups | default(false) | bool

- name: Create NFS backup mount in HAOS for restore
  ansible.builtin.shell: >-
    python3 /usr/local/bin/ha_supervisor_api.py
    "http://{{ ha_initial_ips[groups['homeassistant'][0]] }}:{{ ha_port | default('8123') }}"
    "{{ ha_tokens[groups['homeassistant'][0]] }}"
    POST /mounts
    '{{ _mount_payload | to_json }}'
  vars:
    _mount_payload:
      name: "{{ ha_backup_mount_name }}"
      type: "nfs"
      usage: "backup"
      server: "{{ nas_ip }}"
      path: "{{ nas_nfs_export }}/backups/homeassistant/homeassistant"
  when:
    - ha_restore_needed | bool
    - ha_nas_has_backups | default(false) | bool
    - not (restore_mount_exists | default(false) | bool)

# ------------------------------------------------------------------
# Wait for HAOS to discover backups on the mount
# ------------------------------------------------------------------
- name: Wait for HAOS to discover NAS backups
  ansible.builtin.shell: >-
    python3 /usr/local/bin/ha_supervisor_api.py
    "http://{{ ha_initial_ips[groups['homeassistant'][0]] }}:{{ ha_port | default('8123') }}"
    "{{ ha_tokens[groups['homeassistant'][0]] }}"
    GET /backups
  register: restore_backups_raw
  changed_when: false
  retries: 12
  delay: 5
  until: >-
    (restore_backups_raw.stdout | from_json).backups | default([]) | length > 0
  when:
    - ha_restore_needed | bool
    - ha_nas_has_backups | default(false) | bool

# ------------------------------------------------------------------
# Find newest full backup and trigger restore
# ------------------------------------------------------------------
- name: Find newest full backup
  set_fact:
    ha_restore_slug: >-
      {{ (restore_backups_raw.stdout | from_json).backups | default([])
         | sort(attribute='date', reverse=true)
         | map(attribute='slug') | first | default('') }}
    ha_restore_backup_info: >-
      {{ (restore_backups_raw.stdout | from_json).backups | default([])
         | sort(attribute='date', reverse=true)
         | first | default({}) }}
  when:
    - ha_restore_needed | bool
    - ha_nas_has_backups | default(false) | bool
    - restore_backups_raw.stdout is defined

# ------------------------------------------------------------------
# Fallback: Upload from Proxmox host if discovery failed
# ------------------------------------------------------------------
- name: Upload backup from NAS (fallback if HAOS discovery failed)
  shell: |
    curl -s -w "\n%{http_code}" -X POST \
      "http://{{ ha_initial_ips[groups['homeassistant'][0]] }}:{{ ha_port | default('8123') }}/api/hassio/backups/new/upload" \
      -H "Authorization: Bearer {{ ha_tokens[groups['homeassistant'][0]] }}" \
      -F "file=@{{ ha_nas_newest_backup }}"
  register: ha_backup_upload
  no_log: true
  when:
    - ha_restore_needed | bool
    - ha_nas_has_backups | default(false) | bool
    - ha_restore_slug | default('') | length == 0

- name: Parse upload response (fallback)
  set_fact:
    ha_restore_slug: >-
      {{ (ha_backup_upload.stdout_lines[0:-1] | join('') | from_json).data.slug | default('') }}
  when:
    - ha_backup_upload is defined
    - ha_backup_upload.skipped is not defined or not ha_backup_upload.skipped

- name: Fail if no backup could be found or uploaded
  fail:
    msg: "No backup available for restore (discovery and upload both failed)."
  when:
    - ha_restore_needed | bool
    - ha_nas_has_backups | default(false) | bool
    - ha_restore_slug | default('') | length == 0

- name: Show restore plan
  debug:
    msg: >-
      Restoring backup (slug: {{ ha_restore_slug }})
      {{ ha_restore_backup_info | default({}) }}
  when:
    - ha_restore_needed | bool
    - ha_restore_slug | default('') | length > 0

# ------------------------------------------------------------------
# Trigger restore via Supervisor API
# ------------------------------------------------------------------
- name: Trigger full restore via Supervisor API
  ansible.builtin.shell: >-
    python3 /usr/local/bin/ha_supervisor_api.py
    "http://{{ ha_initial_ips[groups['homeassistant'][0]] }}:{{ ha_port | default('8123') }}"
    "{{ ha_tokens[groups['homeassistant'][0]] }}"
    POST
    /backups/{{ ha_restore_slug }}/restore/full
    '{}'
    --timeout 300
  register: ha_restore_result
  # The API connection drops when HA restarts – this is expected.
  failed_when: false
  no_log: true
  when:
    - ha_restore_needed | bool
    - ha_restore_slug | default('') | length > 0

- name: Show restore trigger result
  debug:
    msg: "Restore triggered. HA will restart now."
  when:
    - ha_restore_result is defined
    - ha_restore_result.skipped is not defined or not ha_restore_result.skipped

# ------------------------------------------------------------------
# Wait for HA to come back after restore
# ------------------------------------------------------------------
- name: Wait for HA to restart after restore
  uri:
    url: "http://{{ ha_initial_ips[item] }}:{{ ha_port | default('8123') }}/api/"
    method: GET
    status_code: [200, 401]
    timeout: 10
  register: ha_restore_wait
  retries: 36
  delay: 10
  until: ha_restore_wait.status is defined and ha_restore_wait.status in [200, 401]
  loop: "{{ groups['homeassistant'] }}"
  when:
    - ha_restore_result is defined
    - ha_restore_result.skipped is not defined or not ha_restore_result.skipped

# ------------------------------------------------------------------
# Re-authenticate after restore (auth DB was replaced)
# ------------------------------------------------------------------
- name: Wait additional time for HA to fully initialize after restore
  pause:
    seconds: 30
  when:
    - ha_restore_result is defined
    - ha_restore_result.skipped is not defined or not ha_restore_result.skipped

- name: Re-authenticate via login flow after restore
  uri:
    url: "http://{{ ha_initial_ips[item] }}:{{ ha_port | default('8123') }}/auth/login_flow"
    method: POST
    headers:
      Origin: "http://{{ ha_initial_ips[item] }}:{{ ha_port | default('8123') }}"
    body_format: json
    body:
      client_id: "http://{{ ha_initial_ips[item] }}:{{ ha_port | default('8123') }}/"
      handler:
        - "homeassistant"
        - null
      redirect_uri: "http://{{ ha_initial_ips[item] }}:{{ ha_port | default('8123') }}/"
    status_code: [200]
    timeout: 30
  register: restore_login_flow
  loop: "{{ groups['homeassistant'] }}"
  when:
    - ha_restore_result is defined
    - ha_restore_result.skipped is not defined or not ha_restore_result.skipped

- name: Submit credentials to post-restore login flow
  uri:
    url: "http://{{ ha_initial_ips[item.item] }}:{{ ha_port | default('8123') }}/auth/login_flow/{{ item.json.flow_id }}"
    method: POST
    headers:
      Origin: "http://{{ ha_initial_ips[item.item] }}:{{ ha_port | default('8123') }}"
    body_format: json
    body:
      username: "{{ ha_admin_user }}"
      password: "{{ ha_admin_password }}"
      client_id: "http://{{ ha_initial_ips[item.item] }}:{{ ha_port | default('8123') }}/"
    status_code: [200]
    timeout: 30
  register: restore_login_result
  no_log: true
  loop: "{{ restore_login_flow.results }}"
  loop_control:
    label: "{{ item.item }}"
  when:
    - item.skipped is not defined or not item.skipped
    - item.status is defined and item.status == 200

- name: Exchange post-restore auth code for tokens
  uri:
    url: "http://{{ ha_initial_ips[item.item.item] }}:{{ ha_port | default('8123') }}/auth/token"
    method: POST
    body_format: form-urlencoded
    body:
      grant_type: authorization_code
      code: "{{ item.json.result }}"
      client_id: "http://{{ ha_initial_ips[item.item.item] }}:{{ ha_port | default('8123') }}/"
    status_code: [200]
    timeout: 30
  register: restore_auth_response
  no_log: true
  loop: "{{ restore_login_result.results }}"
  loop_control:
    label: "{{ item.item.item }}"
  when:
    - item.skipped is not defined or not item.skipped
    - item.status is defined and item.status == 200

- name: Update ha_tokens with post-restore tokens
  set_fact:
    ha_tokens: "{{ ha_tokens | combine({ item.item.item.item: item.json.access_token }) }}"
  loop: "{{ restore_auth_response.results }}"
  no_log: true
  when:
    - item.skipped is not defined or not item.skipped
    - item.status is defined and item.status == 200

# ------------------------------------------------------------------
# Mark restore as completed
# ------------------------------------------------------------------
- name: Set restore flag
  set_fact:
    ha_restored_from_backup: true
  when:
    - ha_restore_result is defined
    - ha_restore_result.skipped is not defined or not ha_restore_result.skipped

- name: Show final restore status
  debug:
    msg: >-
      {{ 'HA successfully restored from NAS backup (native system). Subsequent fresh-install tasks will be skipped.'
         if ha_restored_from_backup | bool
         else 'No restore performed – continuing with fresh installation.' }}
