---
# ==============================================================================
# Tasks: Restore Home Assistant from NAS backup (via Proxmox host)
# ==============================================================================
# Runs AFTER onboarding + static IP and BEFORE any addon/configuration.
# Uses HA's native backup system with NAS storage on the Proxmox host.
#
# The NAS NFS export only allows the Proxmox host IP, so backups are
# uploaded from the Proxmox host's NAS mount to HAOS via the API.
#
# Flow:
# 1. Check entity count (overwrite protection: skip if >50 entities)
# 2. Check NAS for backup files (from Proxmox host filesystem)
# 3. Upload newest backup to HAOS via Supervisor API
# 4. Trigger restore via Supervisor API
# 5. Wait for HA to come back
# 6. Re-authenticate (restore replaces the auth database)
# 7. Set ha_restored_from_backup=true so subsequent tasks can skip
#
# Idempotent: Skips restore when HA already has >50 entities.
# ==============================================================================

- name: "Homeassistant (Stage 1) - Initialize restore tracking"
  set_fact:
    ha_restored_from_backup: false

# ------------------------------------------------------------------
# Ensure ha_initial_ips maps to current (static) IP
# ------------------------------------------------------------------
- name: "Homeassistant (Stage 1) - Update IPs to static"
  ansible.builtin.set_fact:
    ha_initial_ips: "{{ ha_initial_ips | default({}) | combine({item: hostvars[item]['ansible_host']}) }}"
  loop: "{{ groups['homeassistant'] }}"

# ------------------------------------------------------------------
# Pre-flight: should we attempt a restore?
# ------------------------------------------------------------------
- name: "Homeassistant (Stage 1) - Check entity count"
  uri:
    url: "http://{{ ha_initial_ips[item] }}:{{ ha_port | default('8123') }}/api/states"
    method: GET
    headers:
      Authorization: "Bearer {{ ha_tokens[item] }}"
    status_code: [200]
    timeout: 30
  register: ha_states_check
  loop: "{{ groups['homeassistant'] }}"
  when: item in ha_tokens

- name: "Homeassistant (Stage 1) - Evaluate restore need"
  set_fact:
    ha_restore_needed: >-
      {{ ha_states_check.results
         | selectattr('json', 'defined')
         | map(attribute='json')
         | map('length')
         | list | first | default(0) | int <= 50 }}

- name: "Homeassistant (Stage 1) - Show restore decision"
  debug:
    msg: >-
      {{ 'HA has few entities (' +
         (ha_states_check.results | selectattr('json', 'defined')
          | map(attribute='json') | map('length') | list | first | default(0) | string) +
         ') – will attempt restore from NAS backup.'
         if ha_restore_needed | bool
         else 'HA already has data – skipping restore.' }}

# ------------------------------------------------------------------
# Check NAS for backup files (from Proxmox host filesystem)
# ------------------------------------------------------------------
- name: "Homeassistant (Stage 1) - Find NAS backups"
  ansible.builtin.find:
    paths: "{{ nas_backup_mount }}/homeassistant/homeassistant"
    patterns: "*.tar"
    file_type: file
  register: nas_backup_files
  when: ha_restore_needed | bool

- name: "Homeassistant (Stage 1) - Evaluate NAS backup availability"
  set_fact:
    ha_nas_has_backups: "{{ (nas_backup_files.files | default([]) | length) > 0 }}"
    ha_nas_newest_backup: >-
      {{ (nas_backup_files.files | default([])
          | sort(attribute='mtime', reverse=true)
          | first).path | default('') }}
  when: ha_restore_needed | bool

- name: "Homeassistant (Stage 1) - Show NAS backup status"
  debug:
    msg: >-
      {{ 'Found ' + (nas_backup_files.files | default([]) | length | string) +
         ' backup(s) on NAS. Newest: ' + (ha_nas_newest_backup | default('none'))
         if ha_nas_has_backups | default(false) | bool
         else 'No backup files found on NAS – proceeding with fresh install.' }}
  when: ha_restore_needed | bool

# ------------------------------------------------------------------
# Upload backup from Proxmox host NAS mount to HAOS
# ------------------------------------------------------------------
- name: "Homeassistant (Stage 1) - Upload backup to HAOS"
  ansible.builtin.shell: |
    RESPONSE=$(curl -s -w "\n%{http_code}" -X POST \
      "http://{{ ha_initial_ips[groups['homeassistant'][0]] }}:{{ ha_port | default('8123') }}/api/hassio/backups/new/upload" \
      -H "Authorization: Bearer {{ ha_tokens[groups['homeassistant'][0]] }}" \
      -F "file=@{{ ha_nas_newest_backup }}")

    HTTP_CODE=$(echo "$RESPONSE" | tail -1)
    BODY=$(echo "$RESPONSE" | head -n -1)

    if [ "$HTTP_CODE" != "200" ]; then
      echo "Upload failed (HTTP $HTTP_CODE): $BODY"
      exit 1
    fi

    echo "$BODY"
  register: ha_backup_upload
  no_log: true
  when:
    - ha_restore_needed | bool
    - ha_nas_has_backups | default(false) | bool

- name: "Homeassistant (Stage 1) - Parse upload response"
  set_fact:
    ha_restore_slug: "{{ (ha_backup_upload.stdout | from_json).data.slug | default('') }}"
  when:
    - ha_backup_upload is defined
    - ha_backup_upload.skipped is not defined or not ha_backup_upload.skipped

- name: "Homeassistant (Stage 1) - Fail if upload failed"
  fail:
    msg: "Failed to upload backup to HAOS. Output: {{ ha_backup_upload.stdout | default('') }}"
  when:
    - ha_restore_needed | bool
    - ha_nas_has_backups | default(false) | bool
    - ha_restore_slug | default('') | length == 0

- name: "Homeassistant (Stage 1) - Show restore plan"
  debug:
    msg: >-
      Restoring backup (slug: {{ ha_restore_slug }},
      source: {{ ha_nas_newest_backup | default('unknown') }})
  when:
    - ha_restore_needed | bool
    - ha_restore_slug | default('') | length > 0

# ------------------------------------------------------------------
# Trigger restore via Supervisor API
# ------------------------------------------------------------------
- name: "Homeassistant (Stage 1) - Trigger full restore"
  ansible.builtin.shell: >-
    python3 /usr/local/bin/ha_supervisor_api.py
    "http://{{ ha_initial_ips[groups['homeassistant'][0]] }}:{{ ha_port | default('8123') }}"
    "{{ ha_tokens[groups['homeassistant'][0]] }}"
    POST
    /backups/{{ ha_restore_slug }}/restore/full
    '{}'
    --timeout 300
  register: ha_restore_result
  # The API connection drops when HA restarts – this is expected.
  failed_when: false
  no_log: true
  when:
    - ha_restore_needed | bool
    - ha_restore_slug | default('') | length > 0

- name: "Homeassistant (Stage 1) - Show restore trigger result"
  debug:
    msg: "Restore triggered. HA will restart now."
  when:
    - ha_restore_result is defined
    - ha_restore_result.skipped is not defined or not ha_restore_result.skipped

# ------------------------------------------------------------------
# Wait for HA to come back after restore
# ------------------------------------------------------------------
- name: "Homeassistant (Stage 1) - Wait for HA restart after restore"
  uri:
    url: "http://{{ ha_initial_ips[item] }}:{{ ha_port | default('8123') }}/api/"
    method: GET
    status_code: [200, 401]
    timeout: 10
  register: ha_restore_wait
  retries: 36
  delay: 10
  until: ha_restore_wait.status is defined and ha_restore_wait.status in [200, 401]
  loop: "{{ groups['homeassistant'] }}"
  when:
    - ha_restore_result is defined
    - ha_restore_result.skipped is not defined or not ha_restore_result.skipped

# ------------------------------------------------------------------
# Re-authenticate after restore (auth DB was replaced)
# ------------------------------------------------------------------
- name: "Homeassistant (Stage 1) - Wait for HA init after restore"
  pause:
    seconds: 30
  when:
    - ha_restore_result is defined
    - ha_restore_result.skipped is not defined or not ha_restore_result.skipped

- name: "Homeassistant (Stage 1) - Re-auth: login flow after restore"
  uri:
    url: "http://{{ ha_initial_ips[item] }}:{{ ha_port | default('8123') }}/auth/login_flow"
    method: POST
    headers:
      Origin: "http://{{ ha_initial_ips[item] }}:{{ ha_port | default('8123') }}"
    body_format: json
    body:
      client_id: "http://{{ ha_initial_ips[item] }}:{{ ha_port | default('8123') }}/"
      handler:
        - "homeassistant"
        - null
      redirect_uri: "http://{{ ha_initial_ips[item] }}:{{ ha_port | default('8123') }}/"
    status_code: [200]
    timeout: 30
  register: restore_login_flow
  loop: "{{ groups['homeassistant'] }}"
  when:
    - ha_restore_result is defined
    - ha_restore_result.skipped is not defined or not ha_restore_result.skipped

- name: "Homeassistant (Stage 1) - Re-auth: submit credentials"
  uri:
    url: "http://{{ ha_initial_ips[item.item] }}:{{ ha_port | default('8123') }}/auth/login_flow/{{ item.json.flow_id }}"
    method: POST
    headers:
      Origin: "http://{{ ha_initial_ips[item.item] }}:{{ ha_port | default('8123') }}"
    body_format: json
    body:
      username: "{{ ha_admin_user }}"
      password: "{{ ha_admin_password }}"
      client_id: "http://{{ ha_initial_ips[item.item] }}:{{ ha_port | default('8123') }}/"
    status_code: [200]
    timeout: 30
  register: restore_login_result
  no_log: true
  loop: "{{ restore_login_flow.results }}"
  loop_control:
    label: "{{ item.item }}"
  when:
    - item.skipped is not defined or not item.skipped
    - item.status is defined and item.status == 200

- name: "Homeassistant (Stage 1) - Re-auth: exchange tokens"
  uri:
    url: "http://{{ ha_initial_ips[item.item.item] }}:{{ ha_port | default('8123') }}/auth/token"
    method: POST
    body_format: form-urlencoded
    body:
      grant_type: authorization_code
      code: "{{ item.json.result }}"
      client_id: "http://{{ ha_initial_ips[item.item.item] }}:{{ ha_port | default('8123') }}/"
    status_code: [200]
    timeout: 30
  register: restore_auth_response
  no_log: true
  loop: "{{ restore_login_result.results }}"
  loop_control:
    label: "{{ item.item.item }}"
  when:
    - item.skipped is not defined or not item.skipped
    - item.status is defined and item.status == 200

- name: "Homeassistant (Stage 1) - Update tokens after restore"
  set_fact:
    ha_tokens: "{{ ha_tokens | combine({ item.item.item.item: item.json.access_token }) }}"
  loop: "{{ restore_auth_response.results }}"
  no_log: true
  when:
    - item.skipped is not defined or not item.skipped
    - item.status is defined and item.status == 200

# ------------------------------------------------------------------
# Mark restore as completed
# ------------------------------------------------------------------
- name: "Homeassistant (Stage 1) - Set restore flag"
  set_fact:
    ha_restored_from_backup: true
  when:
    - ha_restore_result is defined
    - ha_restore_result.skipped is not defined or not ha_restore_result.skipped

- name: "Homeassistant (Stage 1) - Show restore status"
  debug:
    msg: >-
      {{ 'HA successfully restored from NAS backup (uploaded via Proxmox host). Subsequent fresh-install tasks will be skipped.'
         if ha_restored_from_backup | bool
         else 'No restore performed – continuing with fresh installation.' }}
