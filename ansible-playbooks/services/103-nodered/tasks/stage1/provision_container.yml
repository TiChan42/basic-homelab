---
# tasks/provision_container.yml – LXC Container auf Proxmox erstellen & starten
#
# Benötigte Variablen (aus group_vars/all.yml):
#   proxmox_api_host, proxmox_api_user, proxmox_api_token_id/secret
#   proxmox_node, default_lxc_template, default_storage
#   nodered_container_cores, nodered_container_memory, nodered_container_rootfs
#   nodered_container_mac
#   network_cidr, network_gateway
# Per host (from inventory/hosts.yml):
#   service_id, service_frontend_port, service_backend_port

# ------------------------------------------------------------------
# Prerequisites
# ------------------------------------------------------------------
- name: Ensure Proxmox API library is installed
  apt:
    name: python3-proxmoxer
    state: present
    update_cache: yes

- name: Get list of available OS templates
  command: "pveam list local"
  register: pveam_list
  changed_when: false

- name: Download OS template if missing
  command: "pveam download local {{ default_lxc_template.split('/')[-1] }}"
  when: default_lxc_template.split('/')[-1] not in pveam_list.stdout

- name: Normalize Node-RED rootfs configuration
  set_fact:
    nodered_rootfs_raw: "{{ nodered_container_rootfs | default((default_storage | default('local-lvm', true)) ~ ':4', true) | string }}"
    nodered_rootfs_storage: "{{ (nodered_container_rootfs | default((default_storage | default('local-lvm', true)) ~ ':4', true) | string).split(':')[0] }}"
    nodered_rootfs_size: "{{ (nodered_container_rootfs | default((default_storage | default('local-lvm', true)) ~ ':4', true) | string).split(':')[-1] }}"

- name: Validate Node-RED rootfs configuration
  assert:
    that:
      - nodered_rootfs_storage is defined
      - nodered_rootfs_storage | trim | length > 0
      - nodered_rootfs_storage | lower != 'none'
      - nodered_rootfs_size is defined
      - nodered_rootfs_size | trim | length > 0
      - nodered_rootfs_size | lower != 'none'
    fail_msg: "Invalid Node-RED rootfs config '{{ nodered_rootfs_raw }}' (resolved storage='{{ nodered_rootfs_storage }}', size='{{ nodered_rootfs_size }}')."

# ------------------------------------------------------------------
# Container creation
# ------------------------------------------------------------------
- name: Check if Node-RED container already exists
  command: "pct status {{ hostvars[item]['service_id'] }}"
  register: nodered_container_exists
  changed_when: false
  failed_when: false
  loop: "{{ groups['nodered'] }}"
  loop_control:
    label: "{{ item }} (VMID {{ hostvars[item]['service_id'] }})"

- name: Create Node-RED LXC container
  command: >-
    pct create {{ hostvars[item.item]['service_id'] }} {{ default_lxc_template }}
    --hostname {{ item.item }}
    --cores {{ nodered_container_cores }}
    --memory {{ nodered_container_memory }}
    --swap 512
    --rootfs {{ nodered_rootfs_storage }}:{{ nodered_rootfs_size }}
    --net0 name=eth0,bridge=vmbr0,hwaddr={{ nodered_container_mac | default('BC:24:11:00:01:03') }},ip={{ hostvars[item.item]['ansible_host'] }}{{ network_cidr }},gw={{ network_gateway }}
    --ssh-public-keys /root/.ssh/id_rsa.pub
    --onboot 1
  when: item.rc != 0
  register: nodered_container_create
  changed_when: true
  loop: "{{ nodered_container_exists.results }}"
  loop_control:
    label: "{{ item.item }} (VMID {{ hostvars[item.item]['service_id'] }})"

# ------------------------------------------------------------------
# NAS bind mount (host /mnt/nas → container /mnt/nas)
# ------------------------------------------------------------------
- name: Ensure NAS bind mount is configured on Node-RED container
  shell: |
    VMID={{ hostvars[item]['service_id'] }}
    if pct config $VMID | grep -q "^mp0:"; then
      echo "OK"
    else
      pct set $VMID -mp0 {{ nas_mount }},mp={{ nas_mount }}
      # If container is already running, stop it so mount takes effect on next start
      if pct status $VMID 2>/dev/null | grep -q "running"; then
        pct stop $VMID --timeout 30
        sleep 2
      fi
      echo "CONFIGURED"
    fi
  register: nas_mount_config
  changed_when: "'CONFIGURED' in nas_mount_config.stdout"
  loop: "{{ groups['nodered'] }}"
  loop_control:
    label: "{{ item }}"

- name: Ensure NAS backup directory for Node-RED exists
  file:
    path: "{{ nas_backup_mount }}/nodered"
    state: directory
    mode: '0777'

- name: Ensure Node-RED container is running
  community.proxmox.proxmox:
    api_host: "{{ proxmox_api_host }}"
    api_user: "{{ proxmox_api_user }}"
    api_token_id: "{{ proxmox_api_token_id }}"
    api_token_secret: "{{ proxmox_api_token_secret }}"
    node: "{{ proxmox_node }}"
    hostname: "{{ item }}"
    vmid: "{{ hostvars[item]['service_id'] }}"
    state: started
  loop: "{{ groups['nodered'] }}"
  loop_control:
    label: "{{ item }}"

- name: Wait for SSH to become available
  wait_for:
    host: "{{ hostvars[item]['ansible_host'] }}"
    port: 22
    timeout: 60
    search_regex: OpenSSH
    delay: 5
  loop: "{{ groups['nodered'] }}"
  loop_control:
    label: "{{ item }}"

# ------------------------------------------------------------------
# Host networking (DNS + Port-Forwarding)
# ------------------------------------------------------------------
- name: Add Node-RED container DNS entry to /etc/hosts
  lineinfile:
    path: /etc/hosts
    line: "{{ hostvars[item]['ansible_host'] }} {{ item }}"
    state: present
    mode: '0644'
  loop: "{{ groups['nodered'] }}"
  loop_control:
    label: "{{ item }}"

- name: Forward Node-RED port to container
  ansible.builtin.iptables:
    table: nat
    chain: PREROUTING
    protocol: tcp
    destination_port: "{{ hostvars[item]['service_frontend_port'] }}"
    jump: DNAT
    to_destination: "{{ hostvars[item]['ansible_host'] }}:{{ hostvars[item]['service_backend_port'] }}"
    comment: "Forward Node-RED {{ hostvars[item]['service_frontend_port'] }} -> {{ item }}"
  loop: "{{ groups['nodered'] }}"
  loop_control:
    label: "{{ item }} (:{{ hostvars[item]['service_frontend_port'] }})"
