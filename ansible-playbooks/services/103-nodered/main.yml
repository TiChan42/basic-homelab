---
# ============================================================
# STAGE 1 – Provision LXC container on Proxmox host
# ============================================================
- name: "Node-RED (Stage 1) - Provision LXC container"
  hosts: localhost
  become: yes
  gather_facts: yes
  tags: [stage1, provision]
  vars_files:
    - "../../inventory/group_vars/all.yml"

  tasks:
    - name: "Node-RED (Stage 1) - Provision & host-side networking"
      include_tasks: tasks/stage1/provision.yml

# ============================================================
# STAGE 2 – Runtime provisioning inside container
# ============================================================
- name: "Node-RED (Stage 2) - Install runtime & restore data"
  hosts: nodered
  become: yes
  gather_facts: yes
  tags: [stage2, deploy]
  vars_files:
    - "../../inventory/group_vars/all.yml"

  tasks:
    - name: "Node-RED (Stage 2) - Network, install, restore"
      include_tasks: tasks/stage2/runtime_and_restore.yml

# ============================================================
# STAGE 3 – Service configuration & integration checks
# ============================================================
- name: "Node-RED (Stage 3) - Configure service and integrations"
  hosts: nodered
  become: yes
  gather_facts: yes
  tags: [stage3]
  vars_files:
    - "../../inventory/group_vars/all.yml"

  tasks:
    - name: "Node-RED (Stage 3) - Configure and validate integrations"
      include_tasks: tasks/stage3/configure_and_validate.yml

  handlers:
    - name: Restart Node-RED
      systemd:
        name: nodered
        state: restarted

    - name: Reload systemd
      systemd:
        daemon_reload: yes

# ============================================================
# STAGE 4 – Backup infrastructure & health verification
# ============================================================
- name: "Node-RED (Stage 4) - Backup setup and verify service"
  hosts: nodered
  become: yes
  gather_facts: yes
  tags: [stage4, backup]
  vars_files:
    - "../../inventory/group_vars/all.yml"

  tasks:
    - name: "Node-RED (Stage 4) - Backup scripts, service check, initial backup"
      include_tasks: tasks/stage4/backup_and_verify.yml

  handlers:
    - name: Restart Node-RED
      systemd:
        name: nodered
        state: restarted

    - name: Reload systemd
      systemd:
        daemon_reload: yes
