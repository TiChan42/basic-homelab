---
# tasks/install_n8n.yml – Node.js + n8n installieren
#
# Läuft im Container (hosts: n8n).
# Installiert immer die neueste stabile Version via npm.

# ------------------------------------------------------------------
# System-Abhängigkeiten
# ------------------------------------------------------------------
- name: "n8n (Legacy) - Install system dependencies"
  apt:
    name:
      - git
      - curl
      - gnupg
      - nfs-common
      - build-essential
      - python3
    state: present
    update_cache: yes

# ------------------------------------------------------------------
# Node.js (via NodeSource)
# ------------------------------------------------------------------
- name: "n8n (Legacy) - Add NodeSource GPG keyring"
  shell: |
    curl -fsSL https://deb.nodesource.com/gpgkey/nodesource-repo.gpg.key \
      | gpg --dearmor -o /usr/share/keyrings/nodesource.gpg
  args:
    creates: /usr/share/keyrings/nodesource.gpg

- name: "n8n (Legacy) - Add Node.js repository"
  copy:
    dest: /etc/apt/sources.list.d/nodesource.list
    content: "deb [signed-by=/usr/share/keyrings/nodesource.gpg] https://deb.nodesource.com/node_{{ n8n_node_version }}.x nodistro main\n"
    mode: '0644'
  register: nodesource_repo

- name: "n8n (Legacy) - Install Node.js"
  apt:
    name: nodejs
    state: present
    update_cache: yes

# ------------------------------------------------------------------
# n8n (global, neueste stabile Version - robust gegen ENOTEMPTY)
# ------------------------------------------------------------------
- name: "n8n (Legacy) - Resolve latest n8n version from npm registry"
  command: npm view n8n version
  register: n8n_latest_version_cmd
  changed_when: false

- name: "n8n (Legacy) - Set target n8n version fact"
  set_fact:
    n8n_target_version: "{{ n8n_latest_version_cmd.stdout | trim }}"

- name: "n8n (Legacy) - Resolve npm global module root"
  command: npm root -g
  register: npm_root_global
  changed_when: false

- name: "n8n (Legacy) - Check n8n binary availability"
  command: n8n --version
  register: n8n_binary_check
  changed_when: false
  failed_when: false

- name: "n8n (Legacy) - Set installed n8n version fact from binary"
  set_fact:
    n8n_installed_version: >-
      {{
        (n8n_binary_check.stdout | regex_search('[0-9]+\.[0-9]+\.[0-9]+') | default(''))
        if (n8n_binary_check.rc | default(1)) == 0
        else ''
      }}

- name: "n8n (Legacy) - Determine whether n8n install/update is required"
  set_fact:
    n8n_install_required: >-
      {{
        ((n8n_binary_check.rc | default(1)) != 0)
        or (n8n_installed_version != n8n_target_version)
      }}

- name: "n8n (Legacy) - Remove old n8n package before upgrade (avoids ENOTEMPTY rename issues)"
  file:
    path: "{{ npm_root_global.stdout | trim }}/n8n"
    state: absent
  when: n8n_install_required | bool

- name: "n8n (Legacy) - Install pinned latest n8n globally"
  shell: |
    set -euo pipefail
    npm uninstall -g n8n >/dev/null 2>&1 || true
    rm -rf "$(npm root -g)/n8n" "$(npm root -g)"/.n8n-*
    npm cache clean --force >/dev/null 2>&1 || true
    npm install -g "n8n@{{ n8n_target_version }}" --force
  args:
    executable: /bin/bash
  register: n8n_install_result
  retries: 2
  delay: 5
  until: n8n_install_result.rc == 0
  when: n8n_install_required | bool

- name: "n8n (Legacy) - Verify installed n8n version"
  command: n8n --version
  register: n8n_version_check
  changed_when: false

- name: "n8n (Legacy) - Ensure n8n data directory exists"
  file:
    path: "{{ n8n_data_dir }}"
    state: directory
    owner: root
    group: root
    mode: '0750'
