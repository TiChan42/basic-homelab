---
# tasks/configure_n8n.yml – Environment-Datei & systemd Service
#
# Läuft im Container (hosts: n8n).
# Die .env-Datei enthält alle n8n-Einstellungen inkl. MQTT- und HA-Verbindungsdaten
# als Umgebungsvariablen, die in n8n-Workflows als Variablen verfügbar sind.

# ------------------------------------------------------------------
# Konfigurationsdateien
# ------------------------------------------------------------------
- name: "n8n (Legacy) - Check existing n8n instance config for encryption key"
  stat:
    path: "{{ n8n_data_dir }}/.n8n/config"
  register: n8n_instance_config_stat

- name: "n8n (Legacy) - Read existing n8n instance config"
  slurp:
    src: "{{ n8n_data_dir }}/.n8n/config"
  register: n8n_instance_config_raw
  when: n8n_instance_config_stat.stat.exists

- name: "n8n (Legacy) - Extract encryption key from existing n8n config"
  set_fact:
    n8n_existing_encryption_key: >-
      {{
        (
          (n8n_instance_config_raw.content | b64decode)
          | regex_findall('"encryptionKey"\s*:\s*"([^\"]+)"')
          | first
          | default('')
        )
        if n8n_instance_config_stat.stat.exists
        else ''
      }}

- name: "n8n (Legacy) - Determine effective n8n encryption key"
  set_fact:
    n8n_effective_encryption_key: >-
      {{
        n8n_encryption_key
        | default(
            n8n_existing_encryption_key
            | default(n8n_basic_auth_password | hash('sha256') | truncate(32, True, ''))
          )
      }}

- name: "n8n (Legacy) - Deploy n8n environment file"
  template:
    src: templates/n8n.env.j2
    dest: /etc/n8n.env
    mode: '0600'
    owner: root
    group: root
  notify: Restart n8n

# ------------------------------------------------------------------
# Systemd Service
# ------------------------------------------------------------------
- name: "n8n (Legacy) - Deploy n8n systemd service"
  template:
    src: templates/n8n.service.j2
    dest: /etc/systemd/system/n8n.service
    mode: '0644'
  notify:
    - Reload systemd
    - Restart n8n
