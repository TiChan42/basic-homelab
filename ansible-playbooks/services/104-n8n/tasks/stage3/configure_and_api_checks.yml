---
# ==============================================================================
# Stage 3: Configure service and run integration checks
# ==============================================================================

- name: "n8n (Stage 3) - Check existing instance config for encryption key"
  ansible.builtin.stat:
    path: "{{ n8n_data_dir }}/.n8n/config"
  register: n8n_instance_config_stat

- name: "n8n (Stage 3) - Read existing instance config"
  ansible.builtin.slurp:
    src: "{{ n8n_data_dir }}/.n8n/config"
  register: n8n_instance_config_raw
  when: n8n_instance_config_stat.stat.exists

- name: "n8n (Stage 3) - Extract existing encryption key"
  ansible.builtin.set_fact:
    n8n_existing_encryption_key: >-
      {{
        (
          (n8n_instance_config_raw.content | b64decode)
          | regex_findall('"encryptionKey"\s*:\s*"([^\"]+)"')
          | first
          | default('')
        )
        if n8n_instance_config_stat.stat.exists
        else ''
      }}

- name: "n8n (Stage 3) - Determine effective encryption key"
  ansible.builtin.set_fact:
    n8n_effective_encryption_key: >-
      {{
        n8n_encryption_key
        | default(
            n8n_existing_encryption_key
            | default(n8n_basic_auth_password | hash('sha256') | truncate(32, True, ''))
          )
      }}

- name: "n8n (Stage 3) - Deploy environment file"
  ansible.builtin.template:
    src: templates/n8n.env.j2
    dest: /etc/n8n.env
    owner: root
    group: root
    mode: '0600'
  register: n8n_env_template

- name: "n8n (Stage 3) - Deploy systemd service"
  ansible.builtin.template:
    src: templates/n8n.service.j2
    dest: /etc/systemd/system/n8n.service
    mode: '0644'
  register: n8n_service_template

- name: "n8n (Stage 3) - Reload systemd when unit changed"
  ansible.builtin.systemd:
    daemon_reload: yes
  when: n8n_service_template.changed

- name: "n8n (Stage 3) - Restart n8n when config changed"
  ansible.builtin.systemd:
    name: n8n
    state: restarted
  when: n8n_env_template.changed or n8n_service_template.changed

- name: "n8n (Stage 3) - Ensure n8n is enabled and running"
  ansible.builtin.systemd:
    name: n8n
    enabled: yes
    state: started

- name: "n8n (Stage 3) - Wait for n8n port"
  ansible.builtin.wait_for:
    port: "{{ service_backend_port }}"
    timeout: 45

- name: "n8n (Stage 3) - Check Home Assistant API reachability"
  ansible.builtin.uri:
    url: "{{ n8n_ha_url }}/api/"
    method: GET
    status_code: [200, 401]
    timeout: 10
  register: ha_api_probe
  failed_when: false

- name: "n8n (Stage 3) - Show Home Assistant probe result"
  ansible.builtin.debug:
    msg: "Home Assistant API reachable (HTTP {{ ha_api_probe.status | default('n/a') }})."

- name: "n8n (Stage 3) - Check Node-RED Admin API reachability"
  ansible.builtin.uri:
    url: "{{ (n8n_nodered_url | default('http://' ~ (hostvars['nodered']['ansible_host'] | default('192.168.1.103')) ~ ':' ~ (hostvars['nodered']['service_backend_port'] | default('1880')))) }}/flows"
    method: GET
    status_code: [200, 401]
    timeout: 10
  register: nodered_api_probe
  failed_when: false

- name: "n8n (Stage 3) - Show Node-RED probe result"
  ansible.builtin.debug:
    msg: "Node-RED Admin API reachable (HTTP {{ nodered_api_probe.status | default('n/a') }})."

- name: "n8n (Stage 3) - Check n8n public API with API key"
  ansible.builtin.uri:
    url: "http://127.0.0.1:{{ service_backend_port }}/api/v1/workflows"
    method: GET
    headers:
      X-N8N-API-KEY: "{{ n8n_api_key }}"
    status_code: [200, 401, 403]
    timeout: 10
  register: n8n_api_probe
  when: (n8n_api_key | default('')) | length > 0
  failed_when: false

- name: "n8n (Stage 3) - Show n8n API probe result"
  ansible.builtin.debug:
    msg: "n8n Public API check result: HTTP {{ n8n_api_probe.status | default('n/a') }} (API key configured)."
  when: (n8n_api_key | default('')) | length > 0

- name: "n8n (Stage 3) - Note missing optional API key"
  ansible.builtin.debug:
    msg: "n8n API key is not configured. Set n8n_api_key in all.yml to enable authenticated API checks/import tasks."
  when: (n8n_api_key | default('')) | length == 0
