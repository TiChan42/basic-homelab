---
# ==============================================================================
# Stage 1: Provision n8n LXC on Proxmox host
# ==============================================================================

- name: "n8n (Stage 1) - Ensure Proxmox API Python library is installed"
  ansible.builtin.apt:
    name: python3-proxmoxer
    state: present
    update_cache: yes

- name: "n8n (Stage 1) - Get available local LXC templates"
  ansible.builtin.command: pveam list local
  register: pveam_list
  changed_when: false

- name: "n8n (Stage 1) - Download default LXC template when missing"
  ansible.builtin.command: "pveam download local {{ default_lxc_template.split('/')[-1] }}"
  when: default_lxc_template.split('/')[-1] not in pveam_list.stdout

- name: "n8n (Stage 1) - Ensure NAS backup directory exists"
  ansible.builtin.file:
    path: "{{ nas_backup_mount }}/n8n"
    state: directory
    mode: '0777'

- name: "n8n (Stage 1) - Normalize rootfs configuration"
  ansible.builtin.set_fact:
    n8n_rootfs_raw: "{{ n8n_container_rootfs | default((default_storage | default('local-lvm', true)) ~ ':8', true) | string }}"
    n8n_rootfs_storage: "{{ (n8n_container_rootfs | default((default_storage | default('local-lvm', true)) ~ ':8', true) | string).split(':')[0] }}"
    n8n_rootfs_size: "{{ (n8n_container_rootfs | default((default_storage | default('local-lvm', true)) ~ ':8', true) | string).split(':')[-1] }}"

- name: "n8n (Stage 1) - Validate rootfs configuration"
  ansible.builtin.assert:
    that:
      - n8n_rootfs_storage is defined
      - n8n_rootfs_storage | trim | length > 0
      - n8n_rootfs_storage | lower != 'none'
      - n8n_rootfs_size is defined
      - n8n_rootfs_size | trim | length > 0
      - n8n_rootfs_size | lower != 'none'
    fail_msg: "Invalid n8n rootfs config '{{ n8n_rootfs_raw }}' (resolved storage='{{ n8n_rootfs_storage }}', size='{{ n8n_rootfs_size }}')."

- name: "n8n (Stage 1) - Check if container already exists"
  ansible.builtin.command: "pct status {{ hostvars[item]['service_id'] }}"
  register: n8n_container_exists
  changed_when: false
  failed_when: false
  loop: "{{ groups['n8n'] }}"
  loop_control:
    label: "{{ item }} (VMID {{ hostvars[item]['service_id'] }})"

- name: "n8n (Stage 1) - Create n8n LXC container"
  ansible.builtin.command: >-
    pct create {{ hostvars[item.item]['service_id'] }} {{ default_lxc_template }}
    --hostname {{ item.item }}
    --cores {{ n8n_container_cores }}
    --memory {{ n8n_container_memory }}
    --swap 512
    --rootfs {{ n8n_rootfs_storage }}:{{ n8n_rootfs_size }}
    --net0 name=eth0,bridge=vmbr0,hwaddr={{ n8n_container_mac | default('BC:24:11:00:01:04') }},ip={{ hostvars[item.item]['ansible_host'] }}{{ network_cidr }},gw={{ network_gateway }}
    --ssh-public-keys /root/.ssh/id_rsa.pub
    --onboot 1
  when: item.rc != 0
  register: n8n_container_create
  changed_when: true
  loop: "{{ n8n_container_exists.results }}"
  loop_control:
    label: "{{ item.item }} (VMID {{ hostvars[item.item]['service_id'] }})"

- name: "n8n (Stage 1) - Read container config"
  ansible.builtin.command: "pct config {{ hostvars[item]['service_id'] }}"
  register: n8n_pct_config
  changed_when: false
  loop: "{{ groups['n8n'] }}"
  loop_control:
    label: "{{ item }}"

- name: "n8n (Stage 1) - Configure NAS bind mount on container"
  ansible.builtin.command: "pct set {{ hostvars[item.item]['service_id'] }} -mp0 {{ nas_mount }},mp={{ nas_mount }}"
  when: "'mp0:' not in item.stdout"
  register: n8n_bind_mount_set
  changed_when: true
  loop: "{{ n8n_pct_config.results }}"
  loop_control:
    label: "{{ item.item }}"

- name: "n8n (Stage 1) - Ensure n8n container is running"
  community.proxmox.proxmox:
    api_host: "{{ proxmox_api_host }}"
    api_user: "{{ proxmox_api_user }}"
    api_token_id: "{{ proxmox_api_token_id }}"
    api_token_secret: "{{ proxmox_api_token_secret }}"
    node: "{{ proxmox_node }}"
    vmid: "{{ hostvars[item]['service_id'] }}"
    hostname: "{{ item }}"
    state: started
  loop: "{{ groups['n8n'] }}"
  loop_control:
    label: "{{ item }}"

- name: "n8n (Stage 1) - Wait for SSH"
  ansible.builtin.wait_for:
    host: "{{ hostvars[item]['ansible_host'] }}"
    port: 22
    timeout: 60
    delay: 5
    search_regex: OpenSSH
  loop: "{{ groups['n8n'] }}"
  loop_control:
    label: "{{ item }}"

- name: "n8n (Stage 1) - Add DNS entry to /etc/hosts"
  ansible.builtin.lineinfile:
    path: /etc/hosts
    line: "{{ hostvars[item]['ansible_host'] }} {{ item }}"
    state: present
    mode: '0644'
  loop: "{{ groups['n8n'] }}"
  loop_control:
    label: "{{ item }}"

- name: "n8n (Stage 1) - Configure port forwarding"
  ansible.builtin.iptables:
    table: nat
    chain: PREROUTING
    protocol: tcp
    destination_port: "{{ hostvars[item]['service_frontend_port'] }}"
    jump: DNAT
    to_destination: "{{ hostvars[item]['ansible_host'] }}:{{ hostvars[item]['service_backend_port'] }}"
    comment: "Forward n8n {{ hostvars[item]['service_frontend_port'] }} -> {{ item }}"
  loop: "{{ groups['n8n'] }}"
  loop_control:
    label: "{{ item }} (:{{ hostvars[item]['service_frontend_port'] }})"
