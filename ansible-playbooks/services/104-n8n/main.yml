---
# ==============================================================================
# Playbook: Services - n8n Workflow Automation (staged)
# ======================================================================

# ============================================================
# STAGE 1 – Provision LXC container on Proxmox host
# ============================================================
- name: "n8n (Stage 1) - Provision LXC container"
  hosts: localhost
  become: yes
  gather_facts: yes
  tags: [stage1, provision]
  vars_files:
    - "../../inventory/group_vars/all.yml"

  tasks:
    - name: "n8n (Stage 1) - Provision & host-side networking"
      include_tasks: tasks/stage1/provision.yml

# ============================================================
# STAGE 2 – Runtime provisioning inside container
# ============================================================
- name: "n8n (Stage 2) - Install runtime & restore data"
  hosts: n8n
  become: yes
  gather_facts: yes
  tags: [stage2, deploy]
  vars_files:
    - "../../inventory/group_vars/all.yml"

  tasks:
    - name: "n8n (Stage 2) - Network, install, restore"
      include_tasks: tasks/stage2/runtime_and_restore.yml

# ============================================================
# STAGE 3 – Service configuration & integration checks
# ============================================================
- name: "n8n (Stage 3) - Configure service and integrations"
  hosts: n8n
  become: yes
  gather_facts: yes
  tags: [stage3]
  vars_files:
    - "../../inventory/group_vars/all.yml"

  tasks:
    - name: "n8n (Stage 3) - Configure n8n service"
      include_tasks: tasks/stage3/configure_and_api_checks.yml

  handlers:
    - name: Restart n8n
      systemd:
        name: n8n
        state: restarted

    - name: Reload systemd
      systemd:
        daemon_reload: yes

# ============================================================
# STAGE 4 – Backup infrastructure & health verification
# ============================================================
- name: "n8n (Stage 4) - Backup setup and verify service"
  hosts: n8n
  become: yes
  gather_facts: yes
  tags: [stage4, backup]
  vars_files:
    - "../../inventory/group_vars/all.yml"

  tasks:
    - name: "n8n (Stage 4) - Backup scripts, service check, initial backup"
      include_tasks: tasks/stage4/backup_and_verify.yml

  handlers:
    - name: Restart n8n
      systemd:
        name: n8n
        state: restarted

    - name: Reload systemd
      systemd:
        daemon_reload: yes
