---
- name: Start Proxmox Container
  hosts: localhost
  become: yes
  vars_files:
    - ../vars.yml

  tasks:
    - name: Check if Proxmox container exists
      command: pct config {{ webserver_container_id }}
      register: pct_list
      changed_when: false
      failed_when: false  # Don't fail if not found

    - name: Check if OS template exists
      stat:
        path: "{{ webserver_container_template }}"
      register: template_stat

    - name: Download OS template if it does not exist
      command: "pveam download local {{ webserver_container_template | basename }}"
      when: not template_stat.stat.exists
      register: download_template
      changed_when: download_template.rc == 0

    - name: Create Proxmox container if it does not exist
      command: >
        pct create {{ webserver_container_id }} {{ webserver_container_template }}
        --hostname {{ webserver_container_hostname }}
        --memory {{ webserver_container_memory }}
        --cores {{ webserver_container_cores }}
        --storage {{ webserver_container_storage }}
        --net0 {{ webserver_container_net0 }}
        --rootfs {{ webserver_container_rootfs }}
      when: pct_list.rc != 0
      register: create_container
      changed_when: create_container.rc == 0

    - name: Update /etc/hosts with container IP
      lineinfile:
        path: /etc/hosts
        line: "{{ webserver_container_ip }} {{ webserver_container_hostname }}"
        state: present
      when: create_container.changed

    - name: Check container status
      command: pct status {{ webserver_container_id }}
      register: container_status
      changed_when: false

    - name: Copy SSH key to container
      command: pct exec {{ webserver_container_id }} -- bash -c "mkdir -p /root/.ssh && echo '{{ lookup('file', '/root/.ssh/id_rsa.pub') }}' >> /root/.ssh/authorized_keys"
      when: "'running' in container_status.stdout"
      register: copy_key
      changed_when: copy_key.rc == 0

    - name: Start the Proxmox container
      command: "pct start {{ webserver_container_id }}"
      register: start_container
      changed_when: start_container.rc == 0
      when: "'running' not in container_status.stdout"

    - name: Wait for container to be ready
      pause:
        seconds: 10

    - name: Install and start SSH in container
      command: pct exec {{ webserver_container_id }} -- bash -c "apt update && apt install -y openssh-server && systemctl enable ssh && systemctl start ssh"
      register: install_ssh
      changed_when: install_ssh.rc == 0

    - name: Get container IP
      command: pct exec {{ webserver_container_id }} -- hostname -I
      register: container_ip
      changed_when: false

    - name: Update /etc/hosts with dynamic container IP
      lineinfile:
        path: /etc/hosts
        line: "{{ container_ip.stdout.split()[0] }} {{ webserver_container_hostname }}"
        state: present

- name: Deploy Webserver Service in Proxmox Container
  hosts: "{{ webserver_container_hostname }}"
  become: yes
  vars_files:
    - ../vars.yml

  tasks:
    - name: Install required packages
      apt:
        name:
          - git
          - nodejs
          - npm
        state: present
        update_cache: yes
    - name: Check if git repository exists
      stat:
        path: "/opt/webserver/.git"
      register: repo_stat

    - name: Clone Git repository if not exists
      git:
        repo: "{{ webserver_git_repo }}"
        dest: "/opt/webserver"
        version: main
      when: not repo_stat.stat.exists
      register: clone_result

    - name: Fetch latest changes if repository exists
      command: git fetch origin
      args:
        chdir: "/opt/webserver"
      when: repo_stat.stat.exists
      register: fetch_result
      changed_when: false

    - name: Check if local is behind remote
      command: git rev-parse HEAD
      args:
        chdir: "/opt/webserver"
      register: local_head
      when: repo_stat.stat.exists
      changed_when: false

    - name: Get remote head
      command: git rev-parse origin/main
      args:
        chdir: "/opt/webserver"
      register: remote_head
      when: repo_stat.stat.exists
      changed_when: false

    - name: Pull if not up-to-date
      command: git pull origin main
      args:
        chdir: "/opt/webserver"
      when: repo_stat.stat.exists and local_head.stdout != remote_head.stdout
      register: pull_result
      changed_when: pull_result.rc == 0

    - name: Set git updated flag
      set_fact:
        git_updated: "{{ not repo_stat.stat.exists or pull_result.changed | default(false) }}"

    - name: Ensure build directory exists
      file:
        path: "/opt/webserver/{{ webserver_build_path }}"
        state: directory

    - name: Run build command (only if git changed)
      command: "{{ webserver_build_command }}"
      args:
        chdir: "/opt/webserver/{{ webserver_build_path }}"
      when: git_updated
      register: build_result
      changed_when: build_result.rc == 0

    - name: Start webserver (only if not already running)
      command: "{{ webserver_start_command }}"
      args:
        chdir: "/opt/webserver/{{ webserver_start_path }}"
      when: not (ansible_facts.services | selectattr('name', 'equalto', '{{ webserver_process_name }}') | list | length > 0)
      register: start_result
      changed_when: start_result.rc == 0
      async: 60  # Allow up to 60 seconds for the start command
      poll: 0