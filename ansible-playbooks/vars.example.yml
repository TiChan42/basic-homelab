# ansible-playbooks/vars.example.yml

# Repository values
repo_url: "https://github.com/TiChan42/basic-homelab"  # Replace with actual repo URL
repo_path: "{{ playbook_dir }}/../../"  # Dynamically set to the parent directory of ansible-playbooks

# Variables for mount-persistent-storage.yml
mount_persistent_storage_nas_ip: "YOUR_NAS_IP"
mount_persistent_storage_nas_export: "/export/YOUR_EXPORT_PATH"
mount_persistent_storage_mount_point: "/mnt/nas/services"
mount_persistent_storage_nfs_opts: "rw,vers=4.1,noatime,_netdev,nofail,timeo=600,retrans=2"

# Variables for check-mount.yml
check_mount_nfs_script_path: "/usr/local/bin/check_nfs_mount.sh"
check_mount_nfs_cron_minute: "*/1" # every minute

# Variables for setup-auto-deployment.yml
polling_script_path: "/usr/local/bin/homelab_auto_deployment.sh"
polling_cron_name: "homelab-auto-deployment"
polling_minute: 0
polling_hour: 3

# Variables for webserver service (Node.js project)
webserver_git_repo: "https://github.com/TiChan42/virtual-multiwindow-website.git"  # URL of the Git repository (Node.js project)
webserver_build_path: "" # Path to build directory relative to repo root
webserver_start_path: "" # Path to start directory relative to repo root
webserver_build_command: "npm install && npm run build"  # Build command for Node.js
webserver_start_command: "PORT=3003 npm start"  # Start command for Node.js
webserver_process_name: "node"  # Process name for checking if the server is running
webserver_container_id: "100"  # Proxmox container ID to start
webserver_container_template: "/var/lib/vz/template/cache/debian-12-standard_12.12-1_amd64.tar.zst"  # OS template path
webserver_container_hostname: "desktop-background-webserver"  # Hostname for the container
webserver_container_memory: "512"  # Memory in MB
webserver_container_cores: "1"  # Number of CPU cores
webserver_container_storage: "local-lvm"  # Storage pool
webserver_container_net0: "name=eth0,bridge=vmbr0,ip={{ webserver_container_ip }}/24,gw=192.168.1.1"  # Network configuration
webserver_container_rootfs: "local-lvm:4"  # Root filesystem size in GB